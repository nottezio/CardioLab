<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Pulsus ‚Äî EKG Interpretation Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:#1C1C1E; --bg-surface:#242424; --bg-elevated:#2E2E2E; --bg-hover:#383838;
  --border-dim:#1F2020; --border:#2A2A2A; --border-bright:#3A3A3A;
  --moss-dim:#1A2E1A; --moss-border:#3D6633; --moss:#4E7D42; --moss-light:#7BAB72; --moss-pale:#9EC494; --moss-bright:#9EC494;
  --text-primary:#E8E8E6; --text-secondary:#A0A09E; --text-muted:#606060;
  --red:#C05050; --red-bg:#2A1010; --red-border:#5A2828; --red-text:#E87060;
  --yellow:#D4A020; --amber:#D4A020; --yellow-bg:#2A1F08; --amber-bg:#2A1F08; --yellow-border:#5A4218; --yellow-text:#D4A860;
  --blue:#5090C0; --blue-bg:#0F2030; --blue-border:#25425A; --blue-text:#70A8D4;
  --green:#4E7D42; --green-bg:#142214;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg-base); color: var(--text-primary);
  font-family: 'Outfit', system-ui, sans-serif; font-size: 13px; line-height: 1.55;
  font-weight: 400; min-height: 100vh; padding-bottom: 40px;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
::selection { background: var(--moss-dim); color: var(--moss-pale); }
button { font-family: inherit; cursor: pointer; }
table { border-collapse: collapse; width: 100%; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Navbar */
.navbar { position: fixed; top: 0; left: 0; right: 0; height: 56px;
  background: rgba(46,46,46,0.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border); padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between; z-index: 100; }
.brand { display: flex; align-items: baseline; }
.brand .wordmark { font-family: 'Cormorant Garamond', serif; font-size: 24px;
  font-weight: 600; color: var(--moss-light); letter-spacing: .02em; }
.brand .subtitle { font-size: 11px; color: var(--text-muted);
  margin-left: 10px; margin-top: 4px; letter-spacing: .04em; }
.tabs { display: flex; gap: 8px; overflow-x: auto; }
.tab-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  border-radius: 20px; padding: 6px 16px; font-size: 12px; white-space: nowrap;
  transition: all .2s ease; font-weight: 400; }
.tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.tab-btn.active { background: var(--moss-dim); border-color: var(--moss);
  color: var(--moss-bright); font-weight: 500; }

/* Main + tab panel ‚Äî inactive panels removed from layout entirely */
.main { margin-top: 56px; padding: 24px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; animation: tabFadeIn .2s ease; }
@keyframes tabFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* WIP footer */
.wip-footer { position: fixed; bottom: 0; left: 0; right: 0; height: 40px;
  background: var(--bg-elevated); border-top: 1px solid var(--border);
  border-left: 3px solid var(--moss); padding: 0 20px;
  display: flex; align-items: center; font-size: 11px; color: var(--text-muted);
  z-index: 99; letter-spacing: .02em; }

/* Shared components */
.card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 20px; transition: border-color .2s ease; }
.card:hover { border-color: var(--border-bright); }

.badge { display: inline-block; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 5px;
  letter-spacing: .02em; white-space: nowrap; }
.badge-moss { background: var(--moss-dim); color: var(--moss-bright); border: 1px solid var(--moss-border); }
.badge-red { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-border); }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow-text); border: 1px solid var(--yellow-border); }
.badge-blue { background: var(--blue-bg); color: var(--blue-text); border: 1px solid var(--blue-border); }
.badge-grey { background: var(--bg-surface); color: var(--text-muted); border: 1px solid var(--border); }

.note-box { border-radius: 8px; padding: 10px 14px; font-size: 12px; line-height: 1.55; margin-top: 10px; }
.note-red { background: var(--red-bg); border-left: 3px solid var(--red); color: #E0A090; }
.note-yellow { background: var(--yellow-bg); border-left: 3px solid var(--yellow); color: #D4B870; }
.note-moss { background: var(--green-bg); border-left: 3px solid var(--moss); color: var(--moss-bright); }
.note-blue { background: var(--blue-bg); border-left: 3px solid var(--blue); color: #80B4D8; }

.section-label { font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; margin-top: 24px; }
.section-label:first-child { margin-top: 0; }

/* Collapsible */
.collapse-wrap { margin-bottom: 12px; }
.collapse-header { display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; padding: 14px 20px; background: var(--bg-elevated);
  border: 1px solid var(--border); border-radius: 10px;
  transition: all .2s; gap: 12px; }
.collapse-header:hover { border-color: var(--border-bright); background: var(--bg-hover); }
.collapse-header.open { border-color: var(--moss-dim);
  border-bottom-left-radius: 0; border-bottom-right-radius: 0;
  border-bottom-color: var(--border-dim); }
.collapse-header-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.collapse-title { font-family: 'Cormorant Garamond', serif; font-size: 18px;
  color: var(--text-primary); font-weight: 600; letter-spacing: .015em; }
.collapse-header-right { display: flex; align-items: center; gap: 10px; }
.collapse-body { background: var(--bg-surface); border: 1px solid var(--border);
  border-top: none; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;
  display: grid; grid-template-rows: 0fr;
  transition: grid-template-rows .5s cubic-bezier(.2,.9,.25,1);
  overflow: hidden; }
.collapse-body.open { grid-template-rows: 1fr; }
.collapse-body-inner { min-height: 0; overflow: hidden; padding: 0 20px;
  opacity: 0; transform: translateY(-6px);
  transition: opacity .25s ease, transform .3s ease, padding .5s cubic-bezier(.2,.9,.25,1); }
.collapse-body.open .collapse-body-inner {
  padding: 16px 20px 20px;
  opacity: 1; transform: translateY(0);
  transition: opacity .4s ease .15s, transform .45s cubic-bezier(.2,.9,.25,1) .15s, padding .5s cubic-bezier(.2,.9,.25,1); }
.chevron { transition: transform .45s cubic-bezier(.2,.9,.25,1); color: var(--text-muted); font-size: 14px;
  display: inline-block; width: 14px; text-align: center; }
.chevron.open { transform: rotate(180deg); }

/* Range bar */
.range-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden;
  margin: 6px 0; background: var(--bg-base); }
.range-seg { height: 100%; }
.range-normal { position: relative; }
.range-ticks { display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: var(--text-muted); margin-top: 3px; }

/* Outline buttons */
.btn-outline { background: transparent; border: 1px solid var(--moss); color: var(--moss-light);
  border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: 500;
  letter-spacing: .04em; transition: all .15s ease; }
.btn-outline:hover { background: var(--moss-dim); border-color: var(--moss-light); color: var(--moss-pale); }
.btn-outline-red { background: transparent; border: 1px solid var(--red); color: var(--red-text);
  border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: 500;
  letter-spacing: .04em; transition: all .15s ease; }
.btn-outline-red:hover { background: var(--red-bg); color: #F08070; }

/* TAB 1 ‚Äî Nilai Normal */
.tab1-controls { display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; gap: 16px; }
.tab1-controls h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px;
  font-weight: 600; color: var(--text-primary); letter-spacing: .015em; }
.tab1-controls h2 .sub { font-family: 'Outfit', sans-serif; font-size: 11px;
  font-weight: 400; color: var(--text-muted); margin-left: 10px; letter-spacing: .04em; }

.param-table { width: 100%; }
.param-table thead th { background: var(--bg-base); font-size: 10px; color: var(--text-muted);
  font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
  padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
.param-table tbody tr { border-bottom: 1px solid var(--border-dim);
  transition: background .15s ease; }
.param-table tbody tr:hover { background: var(--bg-hover); }
.param-table tbody tr:last-child { border-bottom: none; }
.param-table td { padding: 14px; vertical-align: top; font-size: 12px; }

.param-name { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--text-primary); margin-bottom: 4px; }
.param-formula { font-style: italic; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.param-value { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: var(--moss-bright); }
.param-unit { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
.param-sex { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--moss-bright); line-height: 1.5; }
.param-sex .sex-tag { color: var(--text-muted); font-size: 10px; margin-right: 4px; }
.param-clinical { color: var(--text-secondary); max-width: 320px; font-size: 12px; line-height: 1.5; }
.param-clinical strong { color: var(--text-primary); font-weight: 500; }
.col-param { width: 22%; } .col-value { width: 16%; } .col-range { width: 28%; } .col-clin { width: 34%; }

/* ECG illustration strip */
.ecg-strip-container { margin-top: 10px; }
.ecg-strip {
  position: relative; width: 100%; max-width: 280px; height: 64px;
  border-radius: 4px; border: 1px solid var(--border); overflow: hidden;
  background-color: #08070a;
  background-image:
    linear-gradient(rgba(220,90,90,0.10) 1px, transparent 1px),
    linear-gradient(90deg, rgba(220,90,90,0.10) 1px, transparent 1px),
    linear-gradient(rgba(220,90,90,0.22) 1px, transparent 1px),
    linear-gradient(90deg, rgba(220,90,90,0.22) 1px, transparent 1px);
  background-size: 4px 4px, 4px 4px, 20px 20px, 20px 20px;
  background-position: 0 0;
}
.ecg-strip svg { width: 100%; height: 100%; display: block; }
.ecg-strip-label {
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: var(--text-muted); margin-top: 4px; letter-spacing: .04em; }

/* Citation tag */
.cite-tag { display: inline-block; font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text-muted); border: 1px dashed var(--border-bright);
  padding: 1px 5px; border-radius: 3px; margin-left: 6px; letter-spacing: .02em; }

/* TAB 2 ‚Äî Patofisiologi */
.cat-wrap { margin-bottom: 14px; border-left: 3px solid transparent; }
.cat-wrap.urgency-emergency { border-left-color: var(--red); }
.cat-wrap.urgency-urgent { border-left-color: var(--yellow); }
.cat-wrap.urgency-monitor { border-left-color: var(--blue); }
.cat-wrap.urgency-structural { border-left-color: var(--moss); }
.cat-header { padding-left: 17px; }
.cat-letter { font-family: 'Cormorant Garamond', serif; font-size: 18px;
  font-weight: 700; color: var(--moss-light); margin-right: 8px; }
.cat-count { font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-muted); background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; }
.cond-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px;
  align-items: start; }
@media (max-width: 980px) { .cond-grid { grid-template-columns: 1fr; } }
.cond-card { background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
  transition: border-color .2s ease; }
.cond-card:hover { border-color: var(--border-bright); }
/* Opened card spans the full row; closed siblings keep their compact column form.
   No grid-auto-flow:dense, so cards stay in natural document order. */
.cond-card.open { border-color: var(--moss-dim); grid-column: 1 / -1; }
@media (max-width: 980px) { .cond-card.open { grid-column: auto; } }
.cond-card-head { display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; cursor: pointer; gap: 10px;
  transition: background .15s ease; }
.cond-card-head:hover { background: var(--bg-hover); }
.cond-card-head .cond-name { flex: 1; font-family: 'Outfit', sans-serif;
  font-size: 13px; font-weight: 600; color: var(--text-primary); letter-spacing: .01em; }
.cond-card-head .chevron { font-size: 12px; color: var(--text-muted); }
.cond-body { display: grid; grid-template-rows: 0fr;
  transition: grid-template-rows .45s cubic-bezier(.2,.9,.25,1);
  overflow: hidden;
  border-top: 1px solid transparent; }
.cond-card.open .cond-body { grid-template-rows: 1fr; border-top-color: var(--border-dim); }
.cond-body-inner { min-height: 0; overflow: hidden; padding: 0 16px;
  opacity: 0; transform: translateY(-4px);
  transition: opacity .2s ease, transform .25s ease, padding .45s cubic-bezier(.2,.9,.25,1); }
.cond-card.open .cond-body-inner { padding: 14px 16px 16px;
  opacity: 1; transform: translateY(0);
  transition: opacity .35s ease .12s, transform .4s cubic-bezier(.2,.9,.25,1) .12s, padding .45s cubic-bezier(.2,.9,.25,1); }
.cond-head { display: none; }
.cond-mech { font-style: italic; font-size: 12px; color: var(--text-secondary);
  margin-bottom: 12px; line-height: 1.55; }
.cond-ref { margin-top: 12px; padding-top: 10px; border-top: 1px dashed var(--border-bright);
  font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-muted); letter-spacing: .02em; line-height: 1.5; }
.cond-criteria-table { margin: 10px 0; font-size: 11px; }
.cond-table-wrap { margin: 10px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.cond-table-wrap .cond-criteria-table { margin: 0; min-width: 100%; }
.cond-criteria-table th { text-align: left; font-family: 'Outfit', sans-serif;
  font-size: 9px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-muted); font-weight: 600; padding: 6px 10px;
  border-bottom: 1px solid var(--border); }
.cond-criteria-table td { padding: 7px 10px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-primary); border-bottom: 1px solid var(--border-dim); }
.cond-criteria-table td.label-cell { font-family: 'Outfit', sans-serif; color: var(--text-secondary); }
.cond-criteria-table tr:hover td { background: var(--bg-hover); }
.cond-criteria-table tr:last-child td { border-bottom: none; }
.cond-clinical-block { background: var(--bg-base); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; font-size: 12px;
  font-family: 'JetBrains Mono', monospace; line-height: 1.8;
  margin: 10px 0; color: var(--text-primary); white-space: pre-wrap; }
.cond-clinical-block .clin-title { font-family: 'Outfit', sans-serif; font-size: 11px;
  font-weight: 600; color: var(--moss-bright); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: .06em; }

/* TAB 3 ‚Äî Algoritma */
.algo-grid { display: grid; grid-template-columns: 55% 45%; gap: 20px;
  align-items: start; }
@media (max-width: 980px) { .algo-grid { grid-template-columns: 1fr; } }
.algo-col { padding-right: 4px; }
.algo-col-interp { position: sticky; top: 72px;
  max-height: calc(100vh - 96px); overflow-y: auto;
  scrollbar-width: thin; }
@media (max-width: 980px) {
  .algo-col-interp { position: static; max-height: none; overflow: visible; }
}
.algo-col-head { display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; }
.algo-col-title { font-family: 'Cormorant Garamond', serif; font-size: 18px;
  font-weight: 600; color: var(--text-primary); letter-spacing: .015em; }
.algo-col-title.interp { color: var(--moss-light); }
.form-group { background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
  transition: border-color .2s ease; }
.form-group:hover { border-color: var(--border-bright); }
.form-group-label { font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px; }
.form-group-label .letter { display: inline-block; width: 18px; height: 18px;
  border-radius: 50%; background: var(--moss-dim); border: 1px solid var(--moss-border);
  color: var(--moss-pale); font-family: 'JetBrains Mono', monospace;
  font-size: 10px; text-align: center; line-height: 17px; font-weight: 600; }
.form-row { margin-bottom: 12px; }
.form-row:last-child { margin-bottom: 0; }
.form-row-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
.pill { background: var(--bg-surface); border: 1px solid var(--border);
  color: var(--text-muted); padding: 6px 12px; border-radius: 6px;
  font-size: 12px; cursor: pointer; transition: all .15s ease;
  font-family: 'Outfit', sans-serif; }
.pill:hover { border-color: var(--border-bright); color: var(--text-primary); }
.pill.active { background: var(--moss-dim); border-color: var(--moss);
  color: var(--moss-bright); font-weight: 500; }

/* Interpretation panel */
.completeness { display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  font-size: 10px; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; }
.completeness-bar { flex: 1; height: 4px; background: var(--bg-base);
  border-radius: 2px; overflow: hidden; }
.completeness-fill { height: 100%; background: var(--moss); transition: width .3s ease; }
.interp-section { margin-bottom: 18px; }
.interp-section-title { font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px; }
.interp-empty { font-style: italic; color: var(--text-muted);
  text-align: center; padding: 16px; font-size: 12px; }
.finding-list { list-style: none; }
.finding-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
  font-size: 12px; color: var(--text-primary); animation: slideUp .15s ease; }
.finding-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.finding-dot.red { background: var(--red); }
.finding-dot.yellow { background: var(--yellow); }
.finding-dot.blue { background: var(--blue); }
.finding-dot.green { background: var(--moss); }
.finding-dot.grey { background: var(--text-muted); }
@keyframes slideUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.dx-card { background: var(--bg-base); border: 1px solid var(--border);
  border-left: 3px solid var(--text-muted); border-radius: 8px;
  padding: 10px 14px; margin-bottom: 8px; animation: slideUp .15s ease; }
.dx-card.sev-red { border-left-color: var(--red); }
.dx-card.sev-yellow { border-left-color: var(--yellow); }
.dx-card.sev-blue { border-left-color: var(--blue); }
.dx-card.sev-green { border-left-color: var(--moss); }
.dx-card.sev-grey { border-left-color: var(--text-muted); }
.dx-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.dx-name { font-weight: 500; font-size: 13px; color: var(--text-primary); }
.dx-conf { font-family: 'JetBrains Mono', monospace; font-size: 10px;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
.dx-conf.high { background: var(--moss-dim); color: var(--moss-bright); border: 1px solid var(--moss-border); }
.dx-conf.medium { background: var(--yellow-bg); color: var(--yellow-text); border: 1px solid var(--yellow-border); }
.dx-conf.consider { background: var(--blue-bg); color: var(--blue-text); border: 1px solid var(--blue-border); }
.dx-support { font-size: 11px; color: var(--text-secondary); margin: 4px 0 6px; padding-left: 16px; }
.dx-support li { list-style: '¬∑  '; padding: 2px 0; }
.dx-source { font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: var(--text-muted); border: 1px dashed var(--border-bright);
  padding: 2px 6px; border-radius: 3px; display: inline-block;
  margin-top: 6px; margin-right: 6px; letter-spacing: .02em; }
.dx-link { display: inline-block; font-size: 11px; color: var(--moss-light);
  cursor: pointer; margin-top: 4px; border: none; background: transparent; padding: 0; }
.dx-link:hover { color: var(--moss-pale); text-decoration: underline; }

.next-step { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
  font-size: 12px; color: var(--text-primary); }

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   ENGINE ‚Äî interpretECG (pure function)
   ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
function interpretECG(s) {
  const findings = [];
  const diagnoses = [];
  const warnings = [];
  const nextSteps = [];
  const conflicts = [];
  const has = (k, v) => s[k] === v;
  const any = (k, ...vals) => vals.includes(s[k]);
  const set = (k) => s[k] !== null && s[k] !== undefined;
  const addStep = (txt) => { if (!nextSteps.find(n => n.text === txt)) nextSteps.push({text:txt}); };
  const addDx = (d) => { if (!diagnoses.find(x => x.name === d.name)) diagnoses.push(d); };

  /* ‚îÄ‚îÄ‚îÄ Source references (canonical citations) ‚îÄ‚îÄ‚îÄ */
  const SRC = {
    aha2009:   "AHA/ACC/HRS 2009 ECG Standardization",
    esc2023:   "ESC 2023 ACS Guidelines",
    goldberger:"Goldberger's Clinical ECG 9e",
    marriott:  "Marriott's Practical ECG 12e",
    sgarbossa: "Sgarbossa 1996 / Smith 2012",
    brugada:   "Brugada 1991",
    deZwaan:   "de Zwaan 1989 (Wellens)",
    deWinter:  "de Winter 2008",
    schwartz:  "Schwartz 2011 (LQTS)",
    spodick:   "Spodick 2003 (pericarditis)",
    sokolow:   "Sokolow & Lyon 1949",
    surawicz:  "Surawicz / AHA 2009",
    drew:      "Drew 2010 (QT/TdP)",
    ha√Øs:      "Ha√Øssaguerre 2008 (J wave)",
  };

  /* ‚îÄ‚îÄ‚îÄ Completeness ‚îÄ‚îÄ‚îÄ */
  const groupKeys = {
    tech:["speed","cal","leads"], rate:["rate","rhythm","pwave","pqrs"],
    intervals:["pr","qrsDur","qrsMorph","qtc"], axis:["axis"],
    st:["stInf","stAnt","stLat","stAvr","stMorph","prSeg"],
    twu:["tWave","tLead","uWave"],
    qrsMorph2:["qPath","rProg","voltage","delta","other"],
  };
  let groupsFilled = 0;
  Object.values(groupKeys).forEach(keys => {
    if (keys.some(k => set(k))) groupsFilled++;
  });

  /* ‚îÄ‚îÄ‚îÄ Conflict detection ‚îÄ‚îÄ‚îÄ */
  if (has("pwave","absent") && has("pr","120-200")) {
    conflicts.push({text:"P wave 'tidak ada' bertentangan dengan PR interval 120‚Äì200 ms ‚Äî periksa ulang."});
  }
  if (has("qrsDur","lt120") && any("qrsMorph","rbbb","lbbb")) {
    conflicts.push({text:"QRS <120 ms tidak konsisten dengan BBB lengkap ‚Äî periksa ulang."});
  }
  if (has("pqrs","diss") && has("pwave","absent")) {
    conflicts.push({text:"AV disosiasi memerlukan P wave terlihat ‚Äî periksa ulang."});
  }
  if (has("pr","varProg") && has("pqrs","1to1")) {
    conflicts.push({text:"PR memanjang progresif (Wenckebach) tidak konsisten dengan konduksi 1:1."});
  }

  /* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
     TIER 1 ‚Äî EMERGENCY (red)
     ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */

  /* VF */
  if (has("rhythm","irregIrreg") && has("pwave","absent") &&
      (has("qrsMorph","vt") || has("qrsDur","gte150"))) {
    addDx({sev:"red", conf:"high", name:"Ventricular Fibrillation (VF)",
      supports:["Irama irregularly irregular","Tidak ada P wave","QRS tidak teridentifikasi/sangat lebar"],
      source: SRC.marriott, link:"arr"});
    findings.push({sev:"red", text:"üí• Pola konsisten dengan VF ‚Äî defibrilasi segera"});
    addStep("DEFIBRILASI segera (unsynchronized, 200 J biphasic)");
    addStep("Mulai CPR berkualitas tinggi: 30:2, depth 5‚Äì6 cm, rate 100‚Äì120/min");
    addStep("Epinephrine 1 mg IV/IO setiap 3‚Äì5 menit");
    addStep("Amiodarone 300 mg IV bolus (refractory VF setelah 3 shock)");
  }

  /* VT ‚Äî wide complex tachycardia + AV diss/morphologic */
  if (any("rate","100-150","gt150") && any("qrsDur","120-149","gte150")) {
    const pro = [];
    if (has("pqrs","diss")) pro.push("AV disosiasi");
    if (has("qrsMorph","vt")) pro.push("Pattern VT (lebar irregular)");
    if (has("axis","extreme")) pro.push("Extreme axis (northwest)");
    if (has("qrsDur","gte150")) pro.push("QRS ‚â•150 ms");
    const isVT = pro.length >= 1;
    if (isVT) {
      addDx({sev:"red", conf: pro.length >= 2 ? "high" : "medium",
        name:"Ventricular Tachycardia (VT)",
        supports:["Rate >100","QRS ‚â•120 ms",...pro,"Brugada algorithm Step 3/4 positif"],
        source: SRC.marriott, link:"arr"});
      findings.push({sev:"red", text:"‚öÝÔ∏è Wide-complex tachycardia ‚Äî assume VT sampai terbukti sebaliknya"});
      addStep("Cek hemodinamik ‚Äî UNSTABLE: kardioversi sinkron 100‚Üí200‚Üí300 J");
      addStep("STABLE: amiodarone 150 mg IV bolus over 10 min, atau procainamide 20‚Äì50 mg/min");
      addStep("Koreksi elektrolit: K‚Å∫ >4.0, Mg¬≤‚Å∫ >2.0");
      addStep("Konsultasi kardiologi/EP segera; pertimbangkan ICD post-stabilisasi");
      warnings.push({text:"WCT regular: JANGAN beri AVN blocker (adenosine, BB, CCB, digoksin) jika WPW-AF dicurigai ‚Äî bisa precipitate VF."});
    } else {
      addDx({sev:"yellow", conf:"medium",
        name:"Wide-complex tachycardia (VT vs SVT-aberrancy)",
        supports:["Rate >100","QRS ‚â•120 ms","Tidak ada AV disosiasi terdokumentasi"],
        source: SRC.brugada, link:"arr"});
      warnings.push({text:"WCT tanpa AV disosiasi: jalankan Brugada 4-step algorithm. Riwayat MI/CHF ‚Üí WCT regular = VT >90% kasus."});
    }
  }

  /* Complete Heart Block (3¬∞) */
  if (has("pqrs","diss")) {
    const escapeRate = has("qrsDur","lt120") ? "junctional (QRS sempit)" : "ventricular (QRS lebar)";
    addDx({sev:"red", conf:"high", name:"AV Block derajat 3 (Total / CHB)",
      supports:["AV disosiasi total","Atrial rate > ventricular rate","Escape "+escapeRate], 
      source: SRC.goldberger, link:"cond"});
    findings.push({sev:"red", text:"‚öÝÔ∏è AV block lengkap ‚Äî disosiasi atrium-ventrikel total"});
    addStep("Persiapkan transcutaneous pacing (TCP); konsultasi kardiologi STAT");
    addStep("Atropin 1 mg IV ‚Äî efikasi terbatas pada infranodal block");
    addStep("Cek troponin (R/O inferior MI), K‚Å∫, level obat (digoksin, BB, CCB)");
    addStep("Transvenous pacing dalam <1 jam jika unstable");
  }

  /* High-grade / Mobitz II ‚Äî moreP without varProg */
  if (has("pqrs","moreP") && !has("pr","varProg") && !has("pqrs","diss")) {
    const isMII = has("pr","gt200") || has("pr","120-200");
    addDx({sev:"red", conf: isMII ? "high" : "medium",
      name: isMII ? "AV Block derajat 2 Mobitz II / High-grade" : "AV Block derajat 2 (tipe tidak jelas)",
      supports:["P lebih banyak dari QRS","PR konstan sebelum dropped beat", isMII ? "QRS sering lebar (infranodal)" : ""].filter(Boolean),
      source: SRC.goldberger, link:"cond"});
    findings.push({sev:"red", text:"‚öÝÔ∏è AV block 2¬∞ Mobitz II / high-grade ‚Äî risiko tinggi progresi ke CHB"});
    addStep("Persiapkan transcutaneous pacing ‚Äî Mobitz II = indikasi PPM Class I");
    addStep("Konsultasi kardiologi/EP untuk pacemaker permanen");
    addStep("Atropin: hindari ‚Äî paradoxical worsening pada infranodal block");
  }

  /* STEMI ‚Äî Inferior */
  if (has("stInf","ste")) {
    const supp = ["STE inferior (II, III, aVF) ‚â•1 mm di ‚â•2 lead kontigu"];
    const reciprocals = [];
    if (has("stLat","std")) reciprocals.push("I, aVL");
    if (has("stAnt","std")) reciprocals.push("V1‚ÄìV3");
    if (reciprocals.length) supp.push("Reciprocal STD di "+reciprocals.join(" + "));
    addDx({sev:"red", conf:"high", name:"STEMI Inferior",
      supports: supp, source: SRC.esc2023, link:"acs"});
    findings.push({sev:"red", text:"üí¢ STE inferior ‚Äî STEMI inferior akut (oklusi RCA 80% / LCx 20%)"});
    addStep("AKTIVASI CATH LAB ‚Äî door-to-balloon <90 menit");
    addStep("Rekam V3R‚ÄìV4R untuk R/O RV infarct (jika ada ‚Üí hindari nitrat & morfin, beri loading fluid)");
    addStep("Rekam V7‚ÄìV9 untuk R/O posterior extension");
    addStep("DAPT: aspirin 162‚Äì325 mg + ticagrelor 180 mg / prasugrel 60 mg / clopidogrel 600 mg");
    addStep("Antikoagulan: heparin UFH 60 U/kg bolus atau enoxaparin 1 mg/kg SC");
    addStep("Statin loading: atorvastatin 80 mg PO");
  }

  /* STEMI ‚Äî Anterior */
  if (has("stAnt","ste")) {
    const supp = ["STE V1‚ÄìV4 memenuhi threshold sex-specific (‚ôÇ‚â•40y: 2.0mm; ‚ôÇ<40y: 2.5mm; ‚ôÄ: 1.5mm)"];
    if (has("stInf","std")) supp.push("Reciprocal STD inferior");
    if (has("stLat","ste")) supp.push("Extension lateral (extensive anterior)");
    addDx({sev:"red", conf:"high", name: has("stLat","ste") ? "STEMI Anterolateral (Extensive)" : "STEMI Anterior",
      supports: supp, source: SRC.esc2023, link:"acs"});
    findings.push({sev:"red", text:"üí¢ STE anterior ‚Äî STEMI anterior akut (oklusi LAD proximal)"});
    addStep("AKTIVASI CATH LAB ‚Äî door-to-balloon <90 menit");
    addStep("DAPT + antikoagulan + statin loading (lihat protokol STEMI)");
    addStep("Echocardiogram urgent: EF, LV thrombus, komplikasi mekanik (VSR, free wall rupture)");
    addStep("ICCU monitoring 24‚Äì48 jam ‚Äî risiko aritmia ventrikel + HF akut");
  }

  /* STEMI ‚Äî Lateral (isolated) */
  if (has("stLat","ste") && !has("stAnt","ste") && !has("stInf","ste")) {
    addDx({sev:"red", conf:"high", name:"STEMI Lateral",
      supports:["STE I, aVL, V5‚ÄìV6 ‚â•1 mm","Tanpa STE inferior/anterior ‚Äî isolated lateral"],
      source: SRC.esc2023, link:"acs"});
    findings.push({sev:"red", text:"üí¢ STE lateral isolated ‚Äî kemungkinan oklusi LCx atau diagonal LAD"});
    addStep("AKTIVASI CATH LAB");
    addStep("Catatan: STEMI lateral isolated sering 'electrically silent' pada ECG awal ‚Äî bandingkan ECG serial");
  }

  /* Inferolateral / Inferoposterior combo */
  if (has("stInf","ste") && has("stLat","ste")) {
    addDx({sev:"red", conf:"high", name:"STEMI Inferolateral",
      supports:["STE inferior + lateral","Curiga LCx dominan atau RCA + branches"],
      source: SRC.esc2023, link:"acs"});
  }

  /* aVR STE + diffuse STD ‚Äî LMCA / 3VD */
  if (has("stAvr","ste") && (has("stInf","std") || has("stAnt","std") || has("stLat","std"))) {
    const std_count = (has("stInf","std")?1:0) + (has("stAnt","std")?1:0) + (has("stLat","std")?1:0);
    addDx({sev:"red", conf:"high", name:"aVR STE + diffuse STD ‚Äî LMCA / 3-vessel disease",
      supports:["STE aVR ‚â•1 mm","Diffuse STD di "+std_count+" teritori","Pola subendocardial ischemia global"],
      source: SRC.esc2023, link:"acs"});
    findings.push({sev:"red", text:"‚öÝÔ∏è aVR STE >1 mm + diffuse STD ‚â•6 leads ‚Üí suspect LMCA atau 3VD; mortality sangat tinggi"});
    addStep("AKTIVASI CATH LAB SEGERA ‚Äî pertimbangkan langsung CABG bukan PCI");
    addStep("Konsultasi cardiothoracic surgery");
    addStep("IABP / Impella jika cardiogenic shock");
  }

  /* Brugada Type 1 ‚Äî coved STE V1‚ÄìV2 */
  if (has("stAnt","coved")) {
    addDx({sev:"red", conf:"high", name:"Brugada Type 1 (coved-type)",
      supports:["Coved STE ‚â•2 mm V1‚ÄìV2","Slope descending ‚Üí T inversion","Pola high-risk untuk VF/SCD"],
      source: SRC.brugada, link:"her"});
    findings.push({sev:"red", text:"‚ö° Brugada Type 1 pattern ‚Äî risiko tinggi VF idiopathic / SCD"});
    addStep("Cek triggering factors: demam (antipiretik agresif), hipokalemia, obat Na-blocker (TCA, kokain)");
    addStep("Konsultasi electrophysiology ‚Äî pertimbangkan ICD primary prevention");
    addStep("Family screening (autosomal dominant, ~30% SCN5A mutation)");
    addStep("Edukasi: hindari obat berisiko (lihat brugadadrugs.org)");
  }

  /* De Winter T-waves */
  if (has("stAnt","std") && (has("tWave","hyper") || has("tWave","peaked")) &&
      has("tLead","ant") && has("stMorph","up")) {
    addDx({sev:"red", conf:"high", name:"De Winter T-waves (STEMI-equivalent)",
      supports:["Upsloping STD ‚â•1 mm anterior di J-point","Tall symmetric T waves V1‚ÄìV6","Tanpa STE convencional"],
      source: SRC.deWinter, link:"acs"});
    findings.push({sev:"red", text:"üí¢ De Winter pattern ‚Äî LAD oklusi total/kritis akut"});
    addStep("AKTIVASI CATH LAB ‚Äî treat sebagai STEMI-equivalent");
    addStep("DAPT + antikoagulan loading sesuai protokol STEMI");
    warnings.push({text:"De Winter: klasifikasi formal bukan STEMI klasik, tetapi >90% kasus = oklusi total LAD. Treat sebagai STEMI-equivalent."});
  }

  /* Wellens ‚Äî biphasic / deep symmetric TWI anterior */
  if (!has("stAnt","ste") && has("tLead","ant") &&
      (has("tWave","bi") || has("tWave","deepInv")) && any("rProg","normal")) {
    const pattern = has("tWave","bi") ? "A (biphasic pos‚Üíneg)" : "B (deep symmetric inversion >5 mm)";
    addDx({sev:"red", conf:"high", name:"Wellens Syndrome (Pattern "+pattern+")",
      supports:[
        has("tWave","bi") ? "Biphasic T (pos‚Üíneg) V2‚ÄìV3" : "Deep symmetric inverted T >5 mm V2‚ÄìV3",
        "R wave progression preserved","Tanpa Q wave / STE significant",
        "Pain-free state (klasik post-pain)"
      ], source: SRC.deZwaan, link:"acs"});
    findings.push({sev:"red", text:"‚ö° Wellens pattern ‚Äî stenosis kritikal proximal LAD"});
    addStep("Angiografi koroner urgent dalam 24‚Äì48 jam");
    addStep("KONTRAINDIKASI: stress test (treadmill/dobutamine) ‚Äî risiko precipitate complete occlusion");
    addStep("DAPT + antikoagulan + statin sesuai protokol ACS high-risk");
  }

  /* Posterior STEMI ‚Äî STD V1‚ÄìV3 + tall R + upright T */
  if (has("stAnt","std") && has("rProg","early") && (has("tLead","ant") ? !has("tWave","deepInv") : true)) {
    addDx({sev:"red", conf:"high", name:"Posterior STEMI",
      supports:["STD V1‚ÄìV3 (mirror image)","Tall R V1‚ÄìV3 (R/S >1)","Upright/tall T V1‚ÄìV3","Curiga oklusi RCA distal atau LCx"],
      source: SRC.esc2023, link:"acs"});
    findings.push({sev:"red", text:"üí¢ STD V1‚ÄìV3 + tall R + upright T ‚Äî posterior STEMI hingga proven otherwise"});
    addStep("Rekam V7‚ÄìV9 segera (STE ‚â•0.5 mm = diagnostic)");
    addStep("AKTIVASI CATH LAB jika V7‚ÄìV9 mengkonfirmasi");
    addStep("Sering disertai inferior STEMI ‚Äî cek ulang lead inferior");
  } else if (has("stAnt","std") && !has("tLead","ant")) {
    /* STD anterior tanpa konteks lain ‚Äî flag untuk posterior R/O */
    warnings.push({text:"STD V1‚ÄìV3 isolated: SELALU rule out posterior STEMI. Rekam V7‚ÄìV9."});
    addStep("Rekam leads posterior V7‚ÄìV9");
  }

  /* Hyperacute T isolated (no STE yet) */
  if (has("tWave","hyper") && !has("stAnt","ste") && !has("stInf","ste") && !has("stLat","ste")) {
    addDx({sev:"red", conf:"medium", name:"Hyperacute T waves ‚Äî earliest STEMI sign",
      supports:["Tall broad asymmetric T waves","Belum ada STE definite","Pre-STEMI window: 0‚Äì30 menit oklusi"],
      source: SRC.goldberger, link:"acs"});
    findings.push({sev:"red", text:"‚öÝÔ∏è Hyperacute T ‚Äî kemungkinan early STEMI (sebelum STE develop)"});
    addStep("Serial ECG setiap 10‚Äì15 menit ‚Äî STE bisa muncul dalam 30‚Äì60 menit");
    addStep("Troponin hs serial 0/1/3 jam");
    addStep("Treat sebagai high-risk ACS: DAPT + antikoagulan");
  }

  /* Severe Hyperkalemia ‚Äî pre-arrest pattern */
  if (has("pwave","absent") && has("qrsDur","gte150") && has("tWave","peaked")) {
    addDx({sev:"red", conf:"high", name:"Hyperkalemia berat ‚Äî pre-arrest",
      supports:["P wave hilang","QRS lebar ‚â•150 ms","T wave peaked simetrik","Pola pre-sinusoidal"],
      source: SRC.surawicz, link:"elec"});
    findings.push({sev:"red", text:"‚ö° Hyperkalemia berat ‚Äî pola pre-arrest, risiko VF/asistol imminent"});
    addStep("CALCIUM GLUCONATE 1‚Äì2 g IV STAT (membrane stabilization, onset <5 min)");
    addStep("INSULIN reguler 10 U IV + D40% 25 g IV (intracellular shift, onset 15‚Äì30 min)");
    addStep("Œ≤2-agonist nebulasi (salbutamol 10‚Äì20 mg) sebagai tambahan");
    addStep("HEMODIALISIS EMERGENT ‚Äî definitive treatment");
    addStep("Cek K‚Å∫ serum + ABG + EKG serial setiap 30 menit");
  }

  /* Acute Pericarditis */
  if (has("prSeg","depDiff") && (has("stInf","ste") || has("stAnt","ste") || has("stLat","ste"))) {
    const territoriesSte = [has("stInf","ste"), has("stAnt","ste"), has("stLat","ste")].filter(Boolean).length;
    addDx({sev:"yellow", conf: territoriesSte >= 2 ? "high" : "medium",
      name:"Acute Pericarditis",
      supports:["PR depresi difus (PR elevasi di aVR)","STE concave-up di "+territoriesSte+" teritori","Tanpa reciprocal STD","Tanpa Q wave development"],
      source: SRC.spodick, link:"peri"});
    findings.push({sev:"yellow", text:"Pericarditis pattern ‚Äî Spodick Stage I (PR depression + diffuse concave STE)"});
    addStep("Echocardiogram untuk efusi perikard / tamponade");
    addStep("Troponin serial ‚Äî positif menyarankan myo-pericarditis (cardiac MRI)");
    addStep("CRP, ESR untuk inflammatory marker");
    addStep("NSAID dosis tinggi (ibuprofen 600‚Äì800 mg q8h) + colchicine 0.5 mg BID √ó 3 bulan");
    addStep("Hindari NSAID jika myocarditis disuspek (gunakan steroid jika diperlukan)");
  }

  /* Pulmonary Embolism ‚Äî S1Q3T3 + sinus tachy + RAD */
  if (any("rate","100-150","gt150") && has("rhythm","reg") && has("pwave","normal") &&
      (has("axis","rad") || has("qPath","inf") || (has("tLead","inf") && (has("tWave","deepInv") || has("tWave","diff"))))) {
    const peSupp = ["Sinus tachycardia"];
    if (has("axis","rad")) peSupp.push("RAD (S1Q3T3 component)");
    if (has("qPath","inf")) peSupp.push("Q wave inferior (III)");
    if (has("tLead","inf") && (has("tWave","deepInv") || has("tWave","diff"))) peSupp.push("T inversion inferior (III)");
    if (has("qrsMorph","rbbb")) peSupp.push("RBBB baru ‚Äî right heart strain");
    /* Require at least 2 PE indicators beyond sinus tachy */
    if (peSupp.length >= 3) {
      addDx({sev:"red", conf:"medium", name:"Pulmonary Embolism (cor pulmonale akut)",
        supports: peSupp.concat(["EKG sensitivitas terbatas (~25%) ‚Äî klinis + Wells score + CTPA"]),
        source: SRC.goldberger, link:"hyp"});
      findings.push({sev:"red", text:"‚öÝÔ∏è Pola right heart strain ‚Äî pertimbangkan PE akut"});
      addStep("Hitung Wells score / Geneva score untuk PE pretest probability");
      addStep("D-dimer jika low/intermediate probability");
      addStep("CTPA (gold standard) atau V/Q scan jika kontraindikasi kontras");
      addStep("Echocardiogram bedside: RV dilatasi, McConnell sign, septal flattening");
      addStep("Antikoagulasi empiris (heparin/LMWH) jika probability tinggi sambil menunggu imaging");
    }
  }

  /* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
     TIER 2 ‚Äî URGENT (yellow)
     ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */

  /* LBBB with tachy ‚Äî Sgarbossa reminder */
  if (has("qrsMorph","lbbb") && any("rate","100-150","gt150")) {
    addDx({sev:"yellow", conf:"medium", name:"LBBB dengan tachycardia",
      supports:["LBBB pattern (broad R I/V6, QS V1)","Rate >100","Rule-out STEMI: gunakan Sgarbossa/Smith-modified"],
      source: SRC.sgarbossa, link:"cond"});
    warnings.push({text:"LBBB + chest pain: aplikasi Sgarbossa criteria (‚â•3 poin) atau Modified Sgarbossa (discordant STE/S ratio ‚â•0.25)."});
    addStep("Bandingkan dengan EKG lama ‚Äî LBBB baru = treat sebagai high-risk ACS");
    addStep("Troponin hs serial");
  }

  /* 2¬∞ AVB Mobitz I (Wenckebach) */
  if (has("pr","varProg")) {
    addDx({sev:"blue", conf:"high", name:"AV Block derajat 2 Mobitz I (Wenckebach)",
      supports:["PR memanjang progresif sebelum dropped beat","Pause <2√ó PP interval","Lokasi AVN (biasanya benign)"],
      source: SRC.goldberger, link:"cond"});
    findings.push({sev:"blue", text:"AV block 2¬∞ Mobitz I (Wenckebach) ‚Äî biasanya benign, AVN-level"});
    addStep("Monitor; pacing tidak diindikasikan kecuali simptomatik");
    addStep("Cek obat AVN-blocker (BB, CCB, digoksin), iskemia inferior, tone vagal");
    addStep("Atropin 0.5‚Äì1 mg IV jika simptomatik bradycardia");
  }

  /* QTc >500 ‚Äî TdP risk */
  if (has("qtc","gt500")) {
    addDx({sev:"yellow", conf:"high", name:"QTc >500 ms ‚Äî risiko Torsades de Pointes",
      supports:["QTc >500 ms (zona high risk)","Setiap +10 ms = ~5% peningkatan risiko TdP"],
      source: SRC.drew, link:"elec"});
    findings.push({sev:"yellow", text:"‚öÝÔ∏è QTc >500 ms ‚Äî high risk Torsades de Pointes"});
    addStep("Stop SEMUA obat QT-prolonging (cek crediblemeds.org)");
    addStep("Cek + koreksi K‚Å∫ >4.0, Mg¬≤‚Å∫ >2.0, Ca¬≤‚Å∫ normal");
    addStep("Magnesium sulfate 2 g IV profilaksis jika QTc >550 ms");
    addStep("Cardiac monitor kontinyu sampai QTc <500 ms");
    addStep("Konsultasi kardiologi ‚Äî R/O kongenital LQTS jika tidak ada reversible cause");
  }

  /* Hyperkalemia ‚Äî peaked T (mild-moderate, not pre-arrest) */
  if (has("tWave","peaked") && !(has("pwave","absent") && has("qrsDur","gte150"))) {
    const supp = ["T wave peaked simetrik base sempit"];
    if (has("pwave","absent")) supp.push("P wave flat/hilang");
    if (any("pr","gt200","varProg")) supp.push("PR memanjang");
    if (any("qrsDur","120-149","gte150")) supp.push("QRS melebar");
    const sev = supp.length >= 3 ? "red" : "yellow";
    const conf = supp.length >= 3 ? "high" : "medium";
    addDx({sev, conf, name:"Hyperkalemia (suspect)",
      supports: supp.concat(["Progresi: peaked T ‚Üí P flat ‚Üí QRS lebar ‚Üí sine wave"]),
      source: SRC.surawicz, link:"elec"});
    findings.push({sev, text: sev==="red" ? "‚ö° Hyperkalemia signifikan ‚Äî treat segera" : "T peaked ‚Äî cek K‚Å∫ serum"});
    addStep("Cek K‚Å∫ serum STAT + ABG");
    addStep("EKG serial setiap 30‚Äì60 menit");
    if (sev === "red") {
      addStep("Calcium gluconate 1 g IV jika QRS lebar atau aritmia");
      addStep("Insulin + glucose untuk intracellular shift");
    }
  }

  /* Hypokalemia ‚Äî prominent U + flat T */
  if (has("uWave","prom") && (has("tWave","normal") || has("tLead","diffuse") || !set("tWave"))) {
    addDx({sev:"yellow", conf:"high", name:"Hypokalemia (suspect)",
      supports:["U wave prominent","T flat / amplitudo menurun","Kemungkinan ST depresi ringan","QU lebih panjang dari QT (TU fusion)"],
      source: SRC.surawicz, link:"elec"});
    findings.push({sev:"yellow", text:"‚öÝÔ∏è U prominent + T flat ‚Äî suspect hipokalemia"});
    addStep("Cek K‚Å∫ + Mg¬≤‚Å∫ serum STAT (sering coexist)");
    addStep("Koreksi: K‚Å∫ <3.0 ‚Üí KCl IV 10 mEq/jam via central; K‚Å∫ 3.0‚Äì3.5 ‚Üí KCl oral");
    addStep("Mg sulfate 2 g IV jika Mg <1.8 (sulit koreksi K‚Å∫ tanpa koreksi Mg)");
    addStep("Cardiac monitor ‚Äî risiko TdP, PVC, AF");
  }

  /* NSTEMI / Ischemia ‚Äî STD or TWI regional */
  const std_anywhere = has("stInf","std") || has("stLat","std") ||
                       (has("stAnt","std") && !has("rProg","early") && !(has("tWave","hyper") && has("stMorph","up")));
  const twi_regional = has("tWave","deepInv") && any("tLead","ant","lat","inf");
  if ((std_anywhere || twi_regional) &&
      !has("stInf","ste") && !has("stAnt","ste") && !has("stLat","ste") && !has("stAnt","coved")) {
    const supp = [];
    if (has("stInf","std")) supp.push("STD inferior (II/III/aVF)");
    if (has("stAnt","std")) supp.push("STD anterior (V1‚ÄìV4)");
    if (has("stLat","std")) supp.push("STD lateral (I/aVL/V5‚ÄìV6)");
    if (has("stMorph","horiz")) supp.push("Morfologi horizontal (ischemic)");
    if (has("stMorph","down")) supp.push("Morfologi downsloping (ischemic)");
    if (twi_regional) {
      const lmap = {ant:"anterior", lat:"lateral", inf:"inferior"};
      supp.push("Deep TWI regional ("+(lmap[s.tLead]||s.tLead)+")");
    }
    addDx({sev:"yellow", conf:"high", name:"NSTEMI / Unstable Angina (Subendocardial Ischemia)",
      supports: supp.concat(["Pola subendocardial; tidak transmural"]),
      source: SRC.esc2023, link:"acs"});
    findings.push({sev:"yellow", text:"‚öÝÔ∏è STD/TWI regional ‚Äî NSTEMI/UAP pattern"});
    addStep("Troponin hs serial 0/1/3 jam ‚Äî positif = NSTEMI; negatif = UAP");
    addStep("DAPT: aspirin 162‚Äì325 mg + ticagrelor/clopidogrel");
    addStep("Antikoagulan: fondaparinux 2.5 mg SC atau enoxaparin 1 mg/kg SC");
    addStep("GRACE score untuk risk stratification ‚Äî high risk ‚Üí invasif <24 jam");
    addStep("Statin tinggi-intensitas (atorvastatin 80 mg)");
  }

  /* WPW ‚Äî delta wave or short PR + wide QRS */
  if (has("delta","present") || (has("pr","lt120") && has("qrsDur","120-149"))) {
    addDx({sev:"yellow", conf:"high", name:"WPW Syndrome (Pre-excitation)",
      supports:[
        has("delta","present") ? "Delta wave (slurred upstroke QRS)" : "PR <120 ms + QRS lebar",
        "Accessory pathway (bundle of Kent)","Risiko AVRT dan AF dengan pre-excitation"

    findings.push({sev:"yellow", text:"‚ö° Pre-excitation pattern ‚Äî WPW"});
    warnings.push({text:"WPW + AF = LIFE-THREATENING. KONTRAINDIKASI: adenosine, BB, CCB non-DHP, digoksin, amiodarone IV. Gunakan procainamide/ibutilide atau DC kardioversi."});
    addStep("Konsultasi electrophysiology untuk risk stratification");
    addStep("EP study + RF ablation curative pada sebagian besar kasus");
    addStep("Pasien simptomatik ‚Üí ablation Class I indikasi");
  }

  /* Brugada Type 2 ‚Äî saddle-back */
  if (has("stAnt","saddle")) {
    addDx({sev:"yellow", conf:"medium", name:"Brugada Type 2 pattern (saddle-back)",
      supports:["Saddle-back STE V1‚ÄìV2 ‚â•2 mm","T positif/biphasic","Bukan diagnostic ‚Äî perlu provokasi"],
      source: SRC.brugada, link:"her"});
    warnings.push({text:"Brugada Type 2: bukan diagnostic. Perlu drug challenge (ajmaline, flecainide, procainamide) untuk konversi ke Type 1."});
    addStep("Rekam V1‚ÄìV2 di ICS 2nd dan 3rd (high leads) ‚Äî meningkatkan sensitivitas");
    addStep("Konsultasi EP untuk pertimbangan ajmaline challenge");
    addStep("Cek triggering: demam, hipokalemia, obat");
  }

  /* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
     TIER 3 ‚Äî MONITOR (blue)
     ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */

  /* AF ‚Äî with rate response label */
  if (has("rhythm","irregIrreg") && has("pwave","absent") && any("qrsDur","lt120","120-149")) {
    let label = "Atrial Fibrillation";
    let rateNote = "";
    if (s.rate === "gt150" || s.rate === "100-150") { label += " RVR"; rateNote = "Rapid ventricular response"; }
    else if (s.rate === "lt40") { label += " SVR"; rateNote = "Slow ventricular response ‚Äî curiga AV block atau obat"; }
    else if (s.rate === "40-60") { label += " (controlled)"; rateNote = "Rate controlled"; }
    else if (s.rate === "60-100") { label += " (well-controlled)"; rateNote = "Well-controlled"; }
    addDx({sev:"blue", conf:"high", name: label,
      supports:["Irregularly irregular","P wave absent (f waves di baseline)",rateNote].filter(Boolean),
      source: SRC.marriott, link:"arr"});
    findings.push({sev:"blue", text:"Atrial fibrillation" + (rateNote ? " ‚Äî "+rateNote : "")});
    addStep("CHA‚ÇÇDS‚ÇÇ-VASc + HAS-BLED ‚Äî pertimbangkan antikoagulasi (DOAC/warfarin)");
    if (s.rate === "gt150" || s.rate === "100-150") {
      addStep("Rate control: metoprolol 5 mg IV q5min atau diltiazem 0.25 mg/kg IV (hindari CCB pada HFrEF)");
      addStep("Rhythm control jika onset <48 jam atau antikoagulasi adekuat ‚â•3 minggu");
    }
    if (s.rate === "lt40") {
      addStep("Cek obat AVN-blocker, evaluasi underlying AV block");
    }
  }

  /* SVT ‚Äî narrow regular tachy without normal P */
  if (any("rate","100-150","gt150") && has("rhythm","reg") && has("qrsDur","lt120") &&
      any("pwave","absent","retro")) {
    addDx({sev:"blue", conf:"medium", name:"SVT (AVNRT / AVRT orthodromic)",
      supports:["Rate 150‚Äì250 bpm","QRS sempit (<120 ms)","Regular","P absent atau retrograde",
        "DD/: AVNRT (typical 60% kasus), AVRT (WPW)"],
      source: SRC.marriott, link:"arr"});
    findings.push({sev:"blue", text:"Narrow-complex tachycardia regular ‚Äî SVT"});
    addStep("Maneuver vagal (Valsalva modified, REVERT trial method)");
    addStep("Adenosine 6 mg IV push rapid ‚Üí 12 mg jika gagal ‚Üí 12 mg lagi");
    addStep("Jika gagal: diltiazem 0.25 mg/kg IV atau metoprolol 5 mg IV");
    addStep("Unstable (hipotensi, chest pain, syncope): kardioversi sinkron 50‚Äì100 J");
  }

  /* Sinus brady/tachy */
  if (has("rhythm","reg") && has("pwave","normal") && has("pqrs","1to1")) {
    if (any("rate","lt40","40-60")) {
      addDx({sev:"blue", conf:"high", name:"Sinus Bradycardia",
        supports:["Rate <60 bpm","P normal upright II/III/aVF","Konduksi 1:1"],
        source: SRC.goldberger, link:"arr"});
      findings.push({sev:"blue", text:"Sinus bradycardia"});
      addStep("Evaluasi simptomatik (syncope, presyncope, fatigue, angina)");
      addStep("Cek obat: BB, CCB non-DHP, digoksin, amiodarone, ivabradine");
      addStep("R/O hipotiroid, OSA, ICP tinggi, hipotermia");
      addStep("Simptomatik berat + bradycardia: atropin 0.5‚Äì1 mg IV ‚Üí pacing");
    } else if (any("rate","100-150","gt150")) {
      addDx({sev:"blue", conf:"high", name:"Sinus Tachycardia",
        supports:["Rate >100 bpm","P normal","1:1 conduction"],
        source: SRC.goldberger, link:"arr"});
      findings.push({sev:"blue", text:"Sinus tachycardia ‚Äî cari etiologi"});
      addStep("Cari penyebab: demam, sepsis, dehidrasi, anemia, nyeri, ansietas");
      addStep("R/O: PE, hipertiroid, perdarahan, ketoacidosis, withdrawal");
      addStep("Treat penyebab ‚Äî JANGAN slow rate dengan BB tanpa identifikasi penyebab");
    }
  }

  /* 1¬∞ AVB */
  if (has("pr","gt200")) {
    addDx({sev:"blue", conf:"high", name:"AV Block derajat 1",
      supports:["PR konstan >200 ms","Konduksi 1:1 (semua P diikuti QRS)"],
      source: SRC.goldberger, link:"cond"});
    findings.push({sev:"blue", text:"PR memanjang ‚Äî AV block 1¬∞ (biasanya benign isolated)"});
    addStep("Tidak perlu treatment kecuali simptomatik atau PR ekstrim (>300 ms)");
    addStep("Cek obat AVN-blocker, tone vagal tinggi");
  }

  /* RBBB */
  if (has("qrsMorph","rbbb") && any("qrsDur","120-149","gte150")) {
    addDx({sev:"blue", conf:"high", name:"Right Bundle Branch Block (RBBB)",
      supports:["QRS ‚â•120 ms","rSR' / RSR' (rabbit ears, M-shape) V1","Wide slurred S wave I/V6","T inversion V1‚ÄìV3 (sekunder)"],
      source: SRC.aha2009, link:"cond"});
    findings.push({sev:"blue", text:"RBBB pattern"});
    addStep("Tidak masking STEMI ‚Äî STE tetap dianalisis normal");
    addStep("RBBB baru pada konteks akut: R/O PE, MI, miokarditis");
  }

  /* LBBB without tachy */
  if (has("qrsMorph","lbbb") && any("qrsDur","120-149","gte150") &&
      !any("rate","100-150","gt150")) {
    addDx({sev:"blue", conf:"high", name:"Left Bundle Branch Block (LBBB)",
      supports:["QRS ‚â•120 ms","Broad monophasic R I/aVL/V6 (no Q)","Wide QS / rS V1","ST/T discordant (appropriate)"],
      source: SRC.aha2009, link:"cond"});
    findings.push({sev:"blue", text:"LBBB pattern"});
    warnings.push({text:"LBBB + chest pain: Sgarbossa criteria untuk evaluasi STEMI tersembunyi."});
    addStep("Echocardiogram: EF ‚Äî LBBB + EF ‚â§35% + QRS ‚â•150 ms = kandidat CRT");
    addStep("Bandingkan ECG lama ‚Äî LBBB baru pada konteks akut = high-risk");
  }

  /* LAFB */
  if (has("axis","lad") && !has("qrsMorph","lbbb")) {
    addDx({sev:"blue", conf:"medium", name:"Left Anterior Fascicular Block (LAFB)",
      supports:["LAD ‚â§ -45¬∞","qR I/aVL; rS II/III/aVF","QRS biasanya <120 ms","Eksklusi inferior MI lama, RVH"],
      source: SRC.aha2009, link:"cond"});
    findings.push({sev:"blue", text:"LAFB (Left Anterior Fascicular Block)"});
  }
  /* LPFB */
  if (has("axis","rad") && !has("qrsMorph","rbbb") && !has("axis","extreme")) {
    addDx({sev:"blue", conf:"consider", name:"Left Posterior Fascicular Block (LPFB)",
      supports:["RAD ‚â• +90¬∞","rS I/aVL; qR II/III/aVF","Eksklusi RVH, PE acute, lateral MI, vertical heart"],
      source: SRC.aha2009, link:"cond"});
    warnings.push({text:"LPFB diagnosis of EXCLUSION ‚Äî singkirkan RVH, PE, lateral MI dahulu (LPFB sangat jarang isolated)."});
  }

  /* Bifascicular */
  if (has("qrsMorph","rbbb") && has("axis","lad")) {
    addDx({sev:"yellow", conf:"high", name:"Bifascicular Block (RBBB + LAFB)",
      supports:["RBBB","LAD ‚â§ -45¬∞","Konduksi via fasikel posterior LBB saja"],
      source: SRC.goldberger, link:"cond"});
    if (has("pr","gt200")) {
      addDx({sev:"yellow", conf:"medium", name:"Trifascicular block (incomplete)",
        supports:["Bifascicular + 1¬∞ AVB","Risiko progresi ke CHB"],
        source: SRC.goldberger, link:"cond"});
      addStep("Bifascicular + 1¬∞ AVB + syncope = pacemaker Class IIa");
    }
  }

  /* QTc prolonged borderline (470-500) */
  if (has("qtc","gt470")) {
    addDx({sev:"yellow", conf:"medium", name:"QTc prolonged (>470 ms)",
      supports:["QTc >470 ms (borderline-prolonged)","Risiko TdP meningkat tetapi belum critical"],
      source: SRC.drew, link:"elec"});
    findings.push({sev:"yellow", text:"QTc prolonged ‚Äî review obat & elektrolit"});
    addStep("Review obat QT-prolonging (crediblemeds.org)");
    addStep("Cek K‚Å∫ + Mg¬≤‚Å∫ + Ca¬≤‚Å∫");
    addStep("Monitor QTc serial");

  /* QTc short ‚Äî suspect hypercalcemia / SQTS */
  if (has("qtc","lt340")) {
    addDx({sev:"yellow", conf:"medium", name:"QTc pendek (<340 ms)",
      supports:["QTc <340 ms","DD/: hypercalcemia (cek Ca¬≤‚Å∫ ionized), digoxin effect, hipertermia, Short QT Syndrome"],
      source: SRC.drew, link:"elec"});
    findings.push({sev:"yellow", text:"QTc pendek ‚Äî cek Ca¬≤‚Å∫, digoksin, suhu"});
    addStep("Cek Ca¬≤‚Å∫ ionized, fosfat, PTH");
    addStep("Cek level digoksin jika sedang konsumsi");
    addStep("Family history SCD ‚Üí R/O Short QT Syndrome (genetik)");
  }

  /* LVH voltage ‚Äî with optional strain */
  if (has("voltage","high")) {
    const supp = ["Voltage tinggi (Sokolow-Lyon: S V1 + R V5/V6 ‚â•35 mm)"];
    let withStrain = false;
    if ((has("stLat","std") && has("tLead","lat") && has("tWave","deepInv")) ||
        (has("stLat","std") && has("tWave","deepInv"))) {
      supp.push("LV strain pattern (STD + asymmetric TWI lateral)");
      withStrain = true;
    }
    addDx({sev: withStrain ? "yellow" : "blue", conf:"medium",
      name: withStrain ? "LVH dengan Strain Pattern" : "LVH (suspect ‚Äî voltage criteria)",
      supports: supp.concat(["Cornell, Romhilt-Estes alternatif"]),
      source: SRC.sokolow, link:"hyp"});
    findings.push({sev: withStrain ? "yellow" : "blue",
      text: withStrain ? "LVH dengan strain pattern ‚Äî adverse prognosis" : "Voltage tinggi ‚Äî suspect LVH"});
    addStep("Echocardiogram untuk konfirmasi (LV mass index, wall thickness)");
    if (withStrain) addStep("Strain pattern: cari penyebab ‚Äî HTN lama, AS, HCM, cardiomyopathy");
  }

  /* Low voltage */
  if (has("voltage","low")) {
    addDx({sev:"yellow", conf:"medium", name:"Low Voltage QRS (difus)",
      supports:["QRS amplitudo <5 mm di limb, <10 mm di precordial","DD/: efusi perikard, efusi pleura, obesitas, COPD, amiloidosis, miksedema, infark luas"],
      source: SRC.marriott, link:"hyp"});
    findings.push({sev:"yellow", text:"Low voltage difus ‚Äî cari efusi/infiltrasi"});
    addStep("Echocardiogram untuk efusi perikard, EF, infiltratif");
    addStep("Pertimbangkan: amyloidosis (deposisi), hipotiroid, obesitas morbid");
  }

  /* Osborn J wave ‚Äî hypothermia */
  if (has("other","osborn")) {
    addDx({sev:"yellow", conf:"high", name:"Hypothermia (Osborn / J wave)",
      supports:["Osborn wave terminal QRS","Amplitudo ‚àù derajat hipotermia","Bradycardia + PR/QRS/QT memanjang"],
      source: SRC.ha√Øs, link:"elec"});
    findings.push({sev:"yellow", text:"‚ö° Osborn (J) wave ‚Äî hipotermia"});
    addStep("Ukur suhu inti tubuh (rectal/esophageal)");
    addStep("Re-warming gradual (0.5‚Äì1¬∞C/jam) ‚Äî passive external ‚Üí active external ‚Üí active internal");
    addStep("Hindari manipulasi kasar ‚Äî risiko VF (myocardium irritable)");
    addStep("Tidak deklarasi mati sampai re-warmed ‚â•32¬∞C ('not dead until warm and dead')");
  }

  /* Epsilon wave ‚Äî ARVC */
  if (has("other","epsilon")) {
    addDx({sev:"yellow", conf:"high", name:"ARVC (Arrhythmogenic RV Cardiomyopathy)",
      supports:["Epsilon wave V1‚ÄìV3 (deflection terminal QRS)","Sering disertai TWI anterior tanpa RBBB"],
      source: SRC.marriott, link:"her"});
    findings.push({sev:"yellow", text:"‚ö° Epsilon wave ‚Äî ARVC suspect"});
    addStep("Cardiac MRI dengan kontras (gold standard: fatty infiltration, RV dilatation)");
    addStep("Konsultasi cardiology / EP ‚Äî exercise stress test (sering memicu VT)");
    addStep("Family screening (autosomal dominant; desmosomal mutations)");
    addStep("ICD untuk symptomatic atau aborted SCD");
  }

  /* Inverted U wave ‚Äî ischemia marker */
  if (has("uWave","inv")) {
    addDx({sev:"yellow", conf:"medium", name:"Negative U wave (suspect ischemia)",
      supports:["U wave opposite arah dari T","High specificity untuk patologi ‚Äî terutama CAD LAD"],
      source: SRC.surawicz, link:"elec"});
    findings.push({sev:"yellow", text:"‚öÝÔ∏è U inverted ‚Äî suspect ischemia / strain"});
    addStep("R/O CAD aktif ‚Äî sering precede ST/T changes pada angina");
    addStep("Echocardiogram untuk wall motion, valvular");
  }

  /* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
     TIER 4 ‚Äî INTERPRET (grey)
     ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */

  /* Pathological Q waves */
  if (any("qPath","inf","ant","lat")) {
    const loc = {inf:"inferior",ant:"anterior",lat:"lateral"}[s.qPath];
    addDx({sev:"grey", conf:"medium", name:"Old MI ("+loc+")",
      supports:["Q patologis "+loc+" (‚â•40 ms atau >25% R)","Tanpa STE akut","Loss viable myocardium territorial"],
      source: SRC.goldberger, link:"old"});
    findings.push({sev:"grey", text:"Q patologis "+loc+" ‚Äî infark lama"});
    addStep("Bandingkan EKG lama untuk dating infark");
    addStep("Echocardiogram untuk EF, wall motion, mural thrombus");
    addStep("Optimisasi sekunder: DAPT, statin, ACEi/ARB, BB, lifestyle");
  }

  /* PRWP */
  if (has("rProg","poor") && !has("qPath","ant")) {
    addDx({sev:"grey", conf:"medium", name:"Poor R Wave Progression (PRWP)",
      supports:["R V3 ‚â§3 mm","Transition >V4","DD/: anteroseptal MI lama, LVH, LBBB, COPD, lead misplacement"],
      source: SRC.marriott, link:"old"});
    findings.push({sev:"grey", text:"Poor R progression ‚Äî anteroseptal MI vs LVH vs COPD"});
    addStep("Verifikasi lead placement V1/V2 di ICS 4 (bukan terlalu tinggi)");
    addStep("Echocardiogram untuk membedakan etiologi");
  }

  /* Fragmented QRS */
  if (has("other","fragQrs")) {
    addDx({sev:"grey", conf:"medium", name:"Fragmented QRS",
      supports:["RSR' / notching pada R atau S di ‚â•2 lead kontigu (tanpa BBB)","Marker fibrosis/scar miokard"],
      source: SRC.marriott, link:"old"});
    findings.push({sev:"grey", text:"Fragmented QRS ‚Äî marker scar miokard"});
    addStep("Prediktor mortalitas pada CAD ‚Äî cek fungsi LV, perfusion imaging");
  }

  /* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
     TIER 5 ‚Äî NORMAL (green) ‚Äî only if nothing else flagged
     ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
  if (diagnoses.length === 0 && has("rhythm","reg") && has("pwave","normal") &&
      has("pqrs","1to1") && has("rate","60-100") && has("qrsDur","lt120") &&
      has("qrsMorph","normal") && has("axis","normal") &&
      (any("qtc","340-440","440-470") || !set("qtc"))) {
    addDx({sev:"green", conf:"high", name:"Normal Sinus Rhythm",
      supports:["Rate 60‚Äì100","P normal upright II/III/aVF","1:1 conduction","QRS sempit <120 ms",
        "Axis normal","Tidak ada temuan patologis"],
      source: SRC.goldberger, link:null});
    findings.push({sev:"green", text:"‚úì Normal Sinus Rhythm ‚Äî tidak ada temuan abnormal"});
  }

  /* Confidence label by completeness */
  let confLabel = null;
  if (groupsFilled < 3) confLabel = "Low confidence ‚Äî kurang data";
  else if (groupsFilled < 6) confLabel = "Moderate confidence";

  return {findings, diagnoses, warnings, nextSteps, conflicts, groupsFilled, confLabel};
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   ECG ILLUSTRATION COMPOSER
   Coordinate system: 1 unit ‚âà 1px. 4 units = 1 small box (40ms)
   ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */

/* Beat builder ‚Äî returns {path, endX} */
function ecgBeat(x0, o) {
  o = Object.assign({
    base: 38, pDur: 10, pAmp: 3, pShape: 'normal',
    prSeg: 4, qDur: 2, qAmp: 2, rDur: 3, rAmp: 18,
    sDur: 3, sAmp: 5, stDur: 12, stOffset: 0, stShape: 'flat',
    tDur: 18, tAmp: 5, tShape: 'normal', uAmp: 0, uDur: 10
  }, o);
  let p = "M "+x0+" "+o.base;
  let x = x0;
  /* P wave */
  if (o.pShape === 'absent') {
    p += " L "+(x+o.pDur)+" "+o.base;
  } else if (o.pShape === 'bifid') {
    const m1 = x + o.pDur*0.3, m2 = x + o.pDur*0.7;
    p += " Q "+(x+o.pDur*0.15)+" "+(o.base-o.pAmp*2)+" "+m1+" "+(o.base-o.pAmp*0.4);
    p += " Q "+(x+o.pDur*0.5)+" "+(o.base-o.pAmp*0.4)+" "+m2+" "+(o.base-o.pAmp*0.4);
    p += " Q "+(x+o.pDur*0.85)+" "+(o.base-o.pAmp*2)+" "+(x+o.pDur)+" "+o.base;
  } else if (o.pShape === 'peaked') {
    p += " L "+(x+o.pDur/2)+" "+(o.base-o.pAmp*3);
    p += " L "+(x+o.pDur)+" "+o.base;
  } else if (o.pShape === 'inverted') {
    p += " Q "+(x+o.pDur/2)+" "+(o.base+o.pAmp*2)+" "+(x+o.pDur)+" "+o.base;
  } else {
    p += " Q "+(x+o.pDur/2)+" "+(o.base-o.pAmp*2)+" "+(x+o.pDur)+" "+o.base;
  }
  x += o.pDur;
  /* PR segment */
  x += o.prSeg;
  p += " L "+x+" "+o.base;
  /* QRS ‚Äî sharp */
  p += " L "+(x+o.qDur)+" "+(o.base+o.qAmp);
  x += o.qDur;
  p += " L "+(x+o.rDur)+" "+(o.base-o.rAmp);
  x += o.rDur;
  p += " L "+(x+o.sDur)+" "+(o.base+o.sAmp);
  x += o.sDur;
  /* J-point */
  p += " L "+(x+1)+" "+(o.base+o.stOffset);
  x += 1;
  /* ST segment */
  if (o.stShape === 'concave-up') {
    const m = x + o.stDur/2;
    p += " Q "+m+" "+(o.base+o.stOffset+2.5)+" "+(x+o.stDur)+" "+(o.base+o.stOffset);
  } else if (o.stShape === 'convex-up') {
    const m = x + o.stDur/2;
    p += " Q "+m+" "+(o.base+o.stOffset-3)+" "+(x+o.stDur)+" "+(o.base+o.stOffset);
  } else if (o.stShape === 'coved') {
    /* Brugada coved ‚Äî descends progressively */
    const m = x + o.stDur/2;
    p += " Q "+m+" "+(o.base+o.stOffset+3)+" "+(x+o.stDur)+" "+(o.base+o.stOffset+5);
  } else if (o.stShape === 'saddle') {
    const m = x + o.stDur/2;
    p += " Q "+m+" "+(o.base+o.stOffset+4)+" "+(x+o.stDur)+" "+(o.base+o.stOffset);
  } else if (o.stShape === 'downsloping') {
    p += " L "+(x+o.stDur)+" "+(o.base+o.stOffset+3);
  } else if (o.stShape === 'upsloping') {
    p += " L "+(x+o.stDur)+" "+(o.base+o.stOffset-3);
  } else {
    p += " L "+(x+o.stDur)+" "+(o.base+o.stOffset);
  }
  x += o.stDur;
  /* T wave */
  let stEnd = o.stShape==='coved' ? o.stOffset+5 : (o.stShape==='downsloping' ? o.stOffset+3 : (o.stShape==='upsloping' ? o.stOffset-3 : o.stOffset));
  if (o.tShape === 'inverted') {
    const m = x + o.tDur*0.6;
    p += " Q "+m+" "+(o.base+o.tAmp*2+stEnd)+" "+(x+o.tDur)+" "+o.base;
  } else if (o.tShape === 'peaked') {
    p += " L "+(x+o.tDur/2)+" "+(o.base-o.tAmp*2.5+stEnd);
    p += " L "+(x+o.tDur)+" "+o.base;
  } else if (o.tShape === 'hyperacute') {
    const m = x + o.tDur*0.4;
    p += " Q "+m+" "+(o.base-o.tAmp*2.6+stEnd)+" "+(x+o.tDur)+" "+o.base;
  } else if (o.tShape === 'biphasic') {
    const m1 = x + o.tDur*0.4, m2 = x + o.tDur*0.7;
    p += " Q "+(x+o.tDur*0.2)+" "+(o.base-o.tAmp*1.5+stEnd)+" "+m1+" "+(o.base+stEnd);
    p += " Q "+m2+" "+(o.base+o.tAmp*1.8+stEnd)+" "+(x+o.tDur)+" "+o.base;
  } else if (o.tShape === 'flat') {
    p += " L "+(x+o.tDur)+" "+o.base;
  } else if (o.tShape === 'deep-inv') {
    const m = x + o.tDur/2;
    p += " Q "+m+" "+(o.base+o.tAmp*3+stEnd)+" "+(x+o.tDur)+" "+o.base;
  } else {
    const m = x + o.tDur*0.55;
    p += " Q "+m+" "+(o.base-o.tAmp*2+stEnd)+" "+(x+o.tDur)+" "+o.base;
  }
  x += o.tDur;
  /* U wave (optional) */
  if (o.uAmp > 0) {
    x += 2;
    const m = x + o.uDur/2;
    p += " L "+x+" "+o.base;
    p += " Q "+m+" "+(o.base-o.uAmp*2)+" "+(x+o.uDur)+" "+o.base;
    x += o.uDur;
  } else if (o.uAmp < 0) {
    x += 2;
    const m = x + o.uDur/2;
    p += " L "+x+" "+o.base;
    p += " Q "+m+" "+(o.base-o.uAmp*2)+" "+(x+o.uDur)+" "+o.base;
    x += o.uDur;
  }
  return { path: p, endX: x };
}

function svgWrap(body, w, h) {
  return '<svg viewBox="0 0 '+w+' '+h+'" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">'+body+'</svg>';
}
