      body = '<path d="'+b1.path+'" '+WAVE_Y+'/>'
           + '<path d="'+b2.path+'" '+WAVE_A+'/>'
           + '<path d="'+b3.path+'" '+WAVE_A+'/>'
           + '<text x="8" y="11" '+LBL_Y+'>K 6.0: peaked T</text>'
           + '<text x="68" y="11" '+LBL_A+'>K 7.5: P flat</text>'
           + '<text x="138" y="11" '+LBL_A+'>K &gt;8: wide QRS</text>'
           + '<text x="68" y="55" '+LBL_A+'>Hiperkalemia Progresif</text>';
      break;
    }
    case 'hypok-pattern': {
      /* T flat + U prominent + ST depresi */
      const b = ecgBeat(50, {pDur: 8, pAmp: 2, prSeg: 4, rDur: 2, rAmp: 14, sDur: 2, sAmp: 3, stDur: 8, stOffset: 2, stShape: 'flat', tDur: 14, tAmp: 2, tShape: 'flat', uAmp: 7, uDur: 16, base: 32});
      body = '<path d="'+b.path+'" '+WAVE_A+'/>'
           + '<text x="20" y="11" '+LBL_A+'>T flat + STD ringan + U prominent</text>'
           + '<text x="20" y="55" '+LBL_A+'>Hipokalemia (K &lt;3.0)</text>';
      break;
    }
    case 'hyperca-pattern': {
      /* Short QT ‚Äî short ST */
      const b = ecgBeat(60, {pDur: 8, pAmp: 2, prSeg: 4, rDur: 2, rAmp: 14, sDur: 2, sAmp: 3, stDur: 2, tDur: 14, tAmp: 5, base: 32});
      body = '<path d="'+b.path+'" '+WAVE_Y+'/>'
           + '<line x1="74" y1="14" x2="74" y2="50" '+MARK+'/>'
           + '<line x1="90" y1="14" x2="90" y2="50" '+MARK+'/>'
           + '<text x="20" y="11" '+LBL_Y+'>QT pendek (ST hampir absent)</text>'
           + '<text x="20" y="55" '+LBL_Y+'>Hiperkalsemia</text>';
      break;
    }
    case 'hypoca-pattern': {
      /* Long QT ‚Äî long ST segment, T width normal */
      const b = ecgBeat(30, {pDur: 8, pAmp: 2, prSeg: 4, rDur: 2, rAmp: 14, sDur: 2, sAmp: 3, stDur: 30, tDur: 14, tAmp: 5, base: 32});
      body = '<path d="'+b.path+'" '+WAVE_A+'/>'
           + '<line x1="44" y1="14" x2="44" y2="50" '+MARK+'/>'
           + '<line x1="110" y1="14" x2="110" y2="50" '+MARK+'/>'
           + '<text x="20" y="11" '+LBL_A+'>QT panjang (ST memanjang)</text>'
           + '<text x="20" y="55" '+LBL_A+'>Hipokalsemia</text>';
      break;
    }
    case 'hypothermia-osborn-pattern': {
      /* Slow rate + Osborn J wave (positive hump at end of QRS) */
      let waves = '';
      [30, 150].forEach(x => {
        let p = "M "+x+" 32";
        p += " Q "+(x+3)+" 30 "+(x+8)+" 32";  /* P */
        p += " L "+(x+12)+" 32";  /* PR */
        p += " L "+(x+14)+" 33";  /* q */
        p += " L "+(x+17)+" 18";  /* R */
        p += " L "+(x+20)+" 38";  /* S */
        /* Osborn J wave ‚Äî positive hump */
        p += " Q "+(x+22)+" 24 "+(x+26)+" 32";
        p += " L "+(x+34)+" 32";  /* ST */
        p += " Q "+(x+40)+" 28 "+(x+50)+" 32";  /* T */
        waves += '<path d="'+p+'" '+WAVE_Y+'/>';
        /* Circle the J wave */
        waves += '<circle cx="'+(x+23)+'" cy="27" r="4.5" fill="none" stroke="#D4A860" stroke-width="0.8"/>';
      });
      body = waves
           + '<text x="20" y="11" '+LBL_Y+'>J wave (notch terminal QRS)</text>'
           + '<text x="20" y="55" '+LBL_Y+'>Hipotermia (Osborn wave)</text>';
      break;
    }
    case 'digitalis-effect-pattern': {
      /* Scooped ST depression ‚Äî 'Salvador Dali' */
      const b1 = ecgBeat(20, {pDur: 8, pAmp: 2, prSeg: 4, rDur: 2, rAmp: 14, sDur: 2, sAmp: 3, stDur: 12, stOffset: 2, stShape: 'concave-up', tDur: 12, tAmp: 2, tShape: 'flat', base: 28});
      const b2 = ecgBeat(140, {pDur: 8, pAmp: 2, prSeg: 4, rDur: 2, rAmp: 14, sDur: 2, sAmp: 3, stDur: 12, stOffset: 2, stShape: 'concave-up', tDur: 12, tAmp: 2, tShape: 'flat', base: 28});
      body = '<path d="'+b1.path+'" '+WAVE_Y+'/>'
           + '<path d="'+b2.path+'" '+WAVE_Y+'/>'
           + '<text x="20" y="11" '+LBL_Y+'>Scooped STD ("Salvador Dali")</text>'
           + '<text x="20" y="55" '+LBL_Y+'>Digitalis Effect</text>';
      break;
    }

    /* ‚îÄ‚îÄ‚îÄ PATHO: PERICARDITIS ‚îÄ‚îÄ‚îÄ */
    case 'pericarditis-pattern': {
      /* Diffuse concave STE + PR depression */
      const x = 50, base = 35;
      let p = "M "+x+" "+base;
      p += " Q "+(x+5)+" "+(base-3)+" "+(x+12)+" "+base;  /* P */
      /* PR DEPRESSION ‚Äî segment dips below baseline */
      p += " L "+(x+14)+" "+(base+2);
      p += " L "+(x+18)+" "+(base+2);  /* PR depressed */
      /* QRS */
      p += " L "+(x+20)+" "+(base+3);
      p += " L "+(x+23)+" "+(base-12);
      p += " L "+(x+26)+" "+(base+4);
      /* CONCAVE STE ‚Äî smiles up */
      p += " L "+(x+28)+" "+(base-3);  /* J point elevated */
      p += " Q "+(x+36)+" "+(base-2)+" "+(x+44)+" "+(base-3);  /* concave shape */
      /* T positive */
      p += " Q "+(x+52)+" "+(base-6)+" "+(x+60)+" "+base;
      const p2 = p.replaceAll(' '+x+' ', ' '+(x+90)+' ').replace(/M \d+/, "M "+(x+90));
      /* Simpler: redraw at offset */
      let p3 = "M "+(x+90)+" "+base;
      p3 += " Q "+(x+95)+" "+(base-3)+" "+(x+102)+" "+base;
      p3 += " L "+(x+104)+" "+(base+2);
      p3 += " L "+(x+108)+" "+(base+2);
      p3 += " L "+(x+110)+" "+(base+3);
      p3 += " L "+(x+113)+" "+(base-12);
      p3 += " L "+(x+116)+" "+(base+4);
      p3 += " L "+(x+118)+" "+(base-3);
      p3 += " Q "+(x+126)+" "+(base-2)+" "+(x+134)+" "+(base-3);
      p3 += " Q "+(x+142)+" "+(base-6)+" "+(x+150)+" "+base;
      body = '<path d="'+p+'" '+WAVE_Y+'/>'
           + '<path d="'+p3+'" '+WAVE_Y+'/>'
           + '<text x="20" y="11" '+LBL_Y+'>STE difus concave + PR depresi</text>'
           + '<text x="20" y="55" '+LBL_Y+'>Pericarditis Akut (Spodick I)</text>';
      break;
    }
    case 'myocarditis-pattern': {
      /* Variable ‚Äî show STE + Q wave + TWI mixed */
      const b1 = ecgBeat(20, {pDur: 8, pAmp: 2, prSeg: 4, qDur: 3, qAmp: 4, rDur: 2, rAmp: 10, sDur: 2, sAmp: 3, stDur: 8, stOffset: -3, stShape: 'concave-up', tDur: 14, tAmp: 4, tShape: 'inverted', base: 32});
      const b2 = ecgBeat(130, {pDur: 8, pAmp: 2, prSeg: 4, qDur: 3, qAmp: 4, rDur: 2, rAmp: 10, sDur: 2, sAmp: 3, stDur: 8, stOffset: -3, stShape: 'concave-up', tDur: 14, tAmp: 4, tShape: 'inverted', base: 32});
      body = '<path d="'+b1.path+'" '+WAVE_Y+'/>'
           + '<path d="'+b2.path+'" '+WAVE_Y+'/>'
           + '<text x="20" y="11" '+LBL_Y+'>STE regional + Q + TWI (variable)</text>'
           + '<text x="20" y="55" '+LBL_Y+'>Myocarditis (cardiac MRI dx)</text>';
      break;
    }

    /* ‚îÄ‚îÄ‚îÄ PATHO: HEREDITER ‚îÄ‚îÄ‚îÄ */
    case 'brugada-type1-pattern': {
      /* Coved STE V1-V2 with TWI */
      const b1 = ecgBeat(20, {pDur: 6, pAmp: 1.5, prSeg: 2, qDur: 1, qAmp: 1, rDur: 2, rAmp: 10, sDur: 2, sAmp: 3, stDur: 10, stOffset: -4, stShape: 'coved', tDur: 12, tAmp: 4, tShape: 'inverted', base: 30});
      const b2 = ecgBeat(130, {pDur: 6, pAmp: 1.5, prSeg: 2, qDur: 1, qAmp: 1, rDur: 2, rAmp: 10, sDur: 2, sAmp: 3, stDur: 10, stOffset: -4, stShape: 'coved', tDur: 12, tAmp: 4, tShape: 'inverted', base: 30});
      body = '<path d="'+b1.path+'" '+WAVE_A+'/>'
           + '<path d="'+b2.path+'" '+WAVE_A+'/>'
           + '<text x="20" y="11" '+LBL_A+'>V1-V2: Coved STE ‚â•2mm + TWI</text>'
           + '<text x="20" y="55" '+LBL_A+'>Brugada Type 1 (Diagnostic)</text>';
      break;
    }
    case 'lqts-pattern': {
      /* Long QT + notched T (LQT2-like) */
      const x = 30, base = 35;
      let p = "M "+x+" "+base;
      p += " Q "+(x+5)+" "+(base-3)+" "+(x+12)+" "+base;
      p += " L "+(x+16)+" "+base;
      p += " L "+(x+18)+" "+(base+2);
      p += " L "+(x+21)+" "+(base-14);
      p += " L "+(x+24)+" "+(base+3);
      p += " L "+(x+26)+" "+base;
      /* Long isoelectric */
      p += " L "+(x+48)+" "+base;
      /* Notched T wave */
      p += " Q "+(x+55)+" "+(base-4)+" "+(x+60)+" "+(base-3);
      p += " Q "+(x+64)+" "+(base-5)+" "+(x+68)+" "+(base-2);
      p += " Q "+(x+74)+" "+(base-4)+" "+(x+82)+" "+base;
      body = '<path d="'+p+'" '+WAVE_A+'/>'
           + '<line x1="'+(x+18)+'" y1="14" x2="'+(x+18)+'" y2="48" '+MARK+'/>'
           + '<line x1="'+(x+82)+'" y1="14" x2="'+(x+82)+'" y2="48" '+MARK+'/>'
           + '<line x1="'+(x+18)+'" y1="14" x2="'+(x+82)+'" y2="14" '+MARK+'/>'
           + '<text x="40" y="11" '+LBL_A+'>QT panjang + T notched (LQT2)</text>'
           + '<text x="40" y="55" '+LBL_A+'>Long QT Syndrome</text>';
      break;
    }
    case 'sqts-pattern': {
      /* Short QT + tall peaked T */
      const b = ecgBeat(60, {pDur: 8, pAmp: 2, prSeg: 4, rDur: 2, rAmp: 14, sDur: 2, sAmp: 3, stDur: 2, tDur: 14, tAmp: 9, tShape: 'peaked', base: 32});
      body = '<path d="'+b.path+'" '+WAVE_A+'/>'
           + '<line x1="74" y1="14" x2="74" y2="50" '+MARK+'/>'
           + '<line x1="100" y1="14" x2="100" y2="50" '+MARK+'/>'
           + '<text x="20" y="11" '+LBL_A+'>QTc &lt;340 + T peaked tall</text>'
           + '<text x="20" y="55" '+LBL_A+'>Short QT Syndrome</text>';
      break;
    }
    case 'hcm-yamaguchi-pattern': {
      /* Tall R (LVH voltage) + GIANT deep symmetric T inversion V3-V5 */
      const base = 26;
      function yamBeat(x) {
        let p = "M "+x+" "+base;
        p += " Q "+(x+4)+" "+(base-3)+" "+(x+9)+" "+base;   /* P */
        p += " L "+(x+11)+" "+base;                          /* PR */
        p += " L "+(x+12)+" "+(base+1);                      /* q */
        p += " L "+(x+16)+" "+(base-16);                     /* tall R (LVH) */
        p += " L "+(x+20)+" "+(base+4);                      /* S */
        p += " L "+(x+22)+" "+base;                          /* J */
        /* Giant deep symmetric T inversion */
        p += " Q "+(x+32)+" "+(base+26)+" "+(x+42)+" "+base; /* deep symmetric inverted T */
        return p;
      }
      body = '<path d="'+yamBeat(20)+'" '+WAVE_A+'/>'
           + '<path d="'+yamBeat(130)+'" '+WAVE_A+'/>'
           + '<text x="20" y="11" '+LBL_A+'>V3-V5: R tinggi + Giant TWI ‚â•10mm</text>'
           + '<text x="20" y="57" '+LBL_A+'>Yamaguchi (Apical HCM)</text>';
      break;
    }
    case 'arvc-epsilon-pattern': {
      /* Epsilon wave ‚Äî small deflection terminal QRS in V1 */
      const x = 60, base = 35;
      let p = "M "+x+" "+base;
      p += " Q "+(x+5)+" "+(base-3)+" "+(x+12)+" "+base;
      p += " L "+(x+16)+" "+base;
      p += " L "+(x+18)+" "+(base+1);
      p += " L "+(x+20)+" "+(base-10);
      p += " L "+(x+23)+" "+(base+5);
      /* Epsilon wave ‚Äî small notch after S, before ST */
      p += " L "+(x+25)+" "+base;
      p += " L "+(x+27)+" "+(base-3);  /* small upward */
      p += " L "+(x+29)+" "+(base-1);
      p += " L "+(x+31)+" "+(base-3);
      p += " L "+(x+33)+" "+base;
      /* T inverted */
      p += " Q "+(x+42)+" "+(base+5)+" "+(x+52)+" "+base;
      body = '<path d="'+p+'" '+WAVE_A+'/>'
           + '<circle cx="'+(x+29)+'" cy="'+(base-2)+'" r="5" fill="none" stroke="#E87060" stroke-width="0.8"/>'
           + '<text x="20" y="11" '+LBL_A+'>V1-V3: Epsilon wave (terminal QRS)</text>'
           + '<text x="20" y="55" '+LBL_A+'>ARVC</text>';
      break;
    }

    /* ‚îÄ‚îÄ‚îÄ PATHO: OLD INFARCT ‚îÄ‚îÄ‚îÄ */
    case 'q-pathological-pattern': {
      /* Deep Q in inferior */
      const b1 = ecgBeat(20, {pDur: 8, pAmp: 2, prSeg: 4, qDur: 4, qAmp: 9, rDur: 2, rAmp: 6, sDur: 2, sAmp: 3, stDur: 8, tDur: 14, tAmp: 3, base: 28});
      const b2 = ecgBeat(140, {pDur: 8, pAmp: 2, prSeg: 4, qDur: 4, qAmp: 9, rDur: 2, rAmp: 6, sDur: 2, sAmp: 3, stDur: 8, tDur: 14, tAmp: 3, base: 28});
      body = '<path d="'+b1.path+'" stroke="#A0A09E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
           + '<path d="'+b2.path+'" stroke="#A0A09E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
           + '<text x="20" y="11" '+LBL+'>Q &gt;40ms / &gt;25% R, di II/III/aVF</text>'
           + '<text x="20" y="55" '+LBL+'>Old MI (Q patologis)</text>';
      break;
    }
    case 'ventricular-aneurysm-pattern': {
      /* Q wave + persistent STE */
      const b1 = ecgBeat(20, {pDur: 8, pAmp: 2, prSeg: 4, qDur: 4, qAmp: 8, rDur: 2, rAmp: 4, sDur: 2, sAmp: 2, stDur: 10, stOffset: -4, stShape: 'convex-up', tDur: 12, tAmp: 3, base: 30});
      const b2 = ecgBeat(130, {pDur: 8, pAmp: 2, prSeg: 4, qDur: 4, qAmp: 8, rDur: 2, rAmp: 4, sDur: 2, sAmp: 2, stDur: 10, stOffset: -4, stShape: 'convex-up', tDur: 12, tAmp: 3, base: 30});
      body = '<path d="'+b1.path+'" stroke="#A0A09E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
           + '<path d="'+b2.path+'" stroke="#A0A09E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
           + '<text x="20" y="11" '+LBL+'>Q + STE persisten &gt;6 minggu</text>'
           + '<text x="20" y="55" '+LBL+'>LV Aneurysm</text>';
      break;
    }
    case 'prwp-pattern': {
      /* V1-V4 with tiny R waves */
      const xs = [12, 50, 88, 126, 164, 202];
      const ampR = [1, 1.5, 2.5, 3, 6, 10];
      const ampS = [12, 10, 9, 8, 4, 2];
      let waves = '';
      for (let i = 0; i < 6; i++) {
        const b = ecgBeat(xs[i]-15, {
          pDur: 6, pAmp: 1.5, prSeg: 1, qDur: 1, qAmp: 1,
          rDur: 2, rAmp: ampR[i], sDur: 2, sAmp: ampS[i],
          stDur: 4, tDur: 6, tAmp: 2, base: 28
        });
        waves += '<path d="'+b.path+'" stroke="#A0A09E" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>';
        waves += '<text x="'+(xs[i]-10)+'" y="55" '+LBL+'>V'+(i+1)+'</text>';
      }
      body = waves
           + '<text x="8" y="11" '+LBL+'>R kecil di V1-V4 ‚Äî transition lambat</text>';
      break;
    }
    case 'resting-twi-pattern': {
      /* TWI in lateral leads, regional, not dynamic */
      const b1 = ecgBeat(20, {pDur: 8, pAmp: 2, prSeg: 4, qDur: 1, qAmp: 1, rDur: 2, rAmp: 14, sDur: 2, sAmp: 3, stDur: 6, tDur: 14, tAmp: 5, tShape: 'inverted', base: 28});
      const b2 = ecgBeat(140, {pDur: 8, pAmp: 2, prSeg: 4, qDur: 1, qAmp: 1, rDur: 2, rAmp: 14, sDur: 2, sAmp: 3, stDur: 6, tDur: 14, tAmp: 5, tShape: 'inverted', base: 28});
      body = '<path d="'+b1.path+'" stroke="#A0A09E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
           + '<path d="'+b2.path+'" stroke="#A0A09E" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
           + '<text x="20" y="11" '+LBL+'>TWI regional, non-dynamic</text>'
           + '<text x="20" y="55" '+LBL+'>Resting T Inversion (post-isk)</text>';
      break;
    }

    default:
      return '';
  }
  return svgWrap(body, W, H);
}

/* ‚îÄ‚îÄ‚îÄ INTERPRETATION PANEL ‚îÄ‚îÄ‚îÄ */
const SEV_ORDER = {red:0, yellow:1, blue:2, green:3, grey:4};

function renderInterp(result) {
  const panel = document.getElementById("interpPanel");
  const compLabel = document.getElementById("compLabel");
  const compFill = document.getElementById("compFill");

  /* Completeness */
  const pct = Math.round((result.groupsFilled / 7) * 100);
  compFill.style.width = pct + "%";
  compLabel.textContent = result.groupsFilled + "/7 grup diisi"
    + (result.confLabel ? "  ‚Ä¢  " + result.confLabel : "");

  if (result.groupsFilled === 0) {
    panel.innerHTML = '<div class="interp-empty">Mulai dengan memilih parameter di kolom kiri.<br>Interpretasi akan muncul secara otomatis.</div>';
    return;
  }

  let html = "";

  /* CONFLICTS */
  if (result.conflicts.length > 0) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">‚öÝ Konflik Data</div>';
    result.conflicts.forEach(c => {
      html += '<div class="note-box note-red">'+c.text+'</div>';
    });
    html += '</div>';
  }

  /* TEMUAN UTAMA */
  if (result.findings.length > 0) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">Temuan Utama</div>';
    html += '<ul class="finding-list">';
    result.findings.forEach(f => {
      html += '<li class="finding-item"><span class="finding-dot '+f.sev+'"></span><span>'+f.text+'</span></li>';
    });
    html += '</ul></div>';
  }

  /* DIAGNOSA ‚Äî sorted by severity */
  if (result.diagnoses.length > 0) {
    const sorted = [...result.diagnoses].sort((a,b) => SEV_ORDER[a.sev] - SEV_ORDER[b.sev]);
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">Diagnosa & Diferensial</div>';
    sorted.forEach(d => {
      html += '<div class="dx-card sev-'+d.sev+'">';
      html += '<div class="dx-head">';
      html += '<span class="dx-name">'+d.name+'</span>';
      html += '<span class="dx-conf '+d.conf+'">'+d.conf+'</span>';
      html += '</div>';
      if (d.supports && d.supports.length > 0) {
        html += '<ul class="dx-support">';
        d.supports.forEach(sup => { html += '<li>'+sup+'</li>'; });
        html += '</ul>';
      }
      if (d.source) {
        html += '<span class="dx-source">üìö '+d.source+'</span>';
      }
      if (d.link) {
        html += '<button class="dx-link" data-link="'+d.link+'" data-dxname="'+d.name.replace(/"/g,'&quot;')+'">‚Üí Pelajari di Patofisiologi</button>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  /* WARNINGS */
  if (result.warnings.length > 0) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">‚öÝ Perhatikan Juga</div>';
    result.warnings.forEach(w => {
      html += '<div class="note-box note-yellow">'+w.text+'</div>';
    });
    html += '</div>';
  }

  /* LANGKAH SELANJUTNYA */
  if (result.nextSteps.length > 0) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">Langkah Selanjutnya</div>';
    result.nextSteps.forEach(n => {
      html += '<div class="next-step"><span class="cb"></span><span>'+n.text+'</span></div>';
    });
    html += '</div>';
  }

  /* TEMPLATE INTERPRETASI */
  const template = generateTemplate(formState, result);
  if (template) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">Template Interpretasi</div>';
    html += '<div class="template-box" id="templateBox">';
    html += '<button class="copy-btn" id="copyBtn">Copy</button>';
    html += template;
    html += '</div></div>';
  }

  panel.innerHTML = html;
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   TEMPLATE GENERATOR ‚Äî structured Indonesian interpretation
   ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
function generateTemplate(s, result) {
  if (result.groupsFilled < 3) return null;

  const lines = [];
  const has = (k, v) => s[k] === v;

  /* Irama & rate */
  const rhythmMap = {
    reg: "regular",
    irregReg: "reguler irregular",
    irregIrreg: "irregularly irregular"
  };
  const rateMap = {
    "lt40": "<40 bpm", "40-60": "40‚Äì60 bpm", "60-100": "60‚Äì100 bpm",
    "100-150": "100‚Äì150 bpm", "gt150": ">150 bpm"
  };
  let rhythmLine = "Irama: ";
  if (s.rhythm && s.pwave) {
    if (has("rhythm","reg") && has("pwave","normal") && has("pqrs","1to1")) {
      rhythmLine += "sinus";
    } else if (has("rhythm","irregIrreg") && has("pwave","absent")) {
      rhythmLine += "fibrilasi atrium";
    } else if (has("pqrs","diss") || has("pqrs","moreP")) {
      rhythmLine += "AV block dengan disosiasi";
    } else {
      rhythmLine += (rhythmMap[s.rhythm] || s.rhythm);
    }
  } else {
    rhythmLine += "‚Äî";
  }
  if (s.rate) rhythmLine += ", frekuensi " + (rateMap[s.rate] || s.rate);
  lines.push(rhythmLine + ".");

  /* PR */
  if (s.pr) {
    const prMap = {
      "lt120": "PR interval pendek (<120 ms)",
      "120-200": "PR interval normal (120‚Äì200 ms)",
      "gt200": "PR interval memanjang (>200 ms)",
      "varProg": "PR memanjang progresif (Wenckebach)",
      "nm": "PR tidak terukur"
    };
    lines.push(prMap[s.pr] + ".");
  }

  /* QRS */
  if (s.qrsDur || s.qrsMorph) {
    let qrsLine = "QRS ";
    if (s.qrsDur) {
      qrsLine += {"lt120":"sempit (<120 ms)","120-149":"120‚Äì149 ms","gte150":"‚â•150 ms"}[s.qrsDur];
    }
    if (s.qrsMorph && s.qrsMorph !== "normal") {
      qrsLine += ", morfologi " + {rbbb:"RBBB",lbbb:"LBBB",vt:"VT pattern"}[s.qrsMorph];
    }
    lines.push(qrsLine + ".");
  }

  /* Axis */
  if (s.axis) {
    const axisMap = {
      normal:"normal", lad:"deviasi kiri (LAD)", rad:"deviasi kanan (RAD)",
      extreme:"extreme axis", unk:"tidak diketahui"
    };
    lines.push("Axis: " + axisMap[s.axis] + ".");
  }

  /* QTc */
  if (s.qtc) {
    const qtcMap = {
      "lt340":"QTc pendek (<340 ms)","340-440":"QTc normal (340‚Äì440 ms)",
      "440-470":"QTc borderline (440‚Äì470 ms)","gt470":"QTc memanjang (>470 ms)",
      "gt500":"QTc >500 ms ‚Äî risiko TdP tinggi"
    };
    lines.push(qtcMap[s.qtc] + ".");
  }

  /* ST */
  const stItems = [];
  if (s.stInf && s.stInf !== "iso") stItems.push("ST inferior: " + (s.stInf === "ste" ? "elevasi" : "depresi"));
  if (s.stAnt && s.stAnt !== "iso") {
    const map = {ste:"elevasi", std:"depresi", coved:"coved", saddle:"saddle-back"};
    stItems.push("ST anterior: " + (map[s.stAnt] || s.stAnt));
  }
  if (s.stLat && s.stLat !== "iso") stItems.push("ST lateral: " + (s.stLat === "ste" ? "elevasi" : "depresi"));
  if (s.stAvr && s.stAvr === "ste") stItems.push("STE di aVR");
  if (s.prSeg === "depDiff") stItems.push("PR depresi difus");
  if (stItems.length > 0) lines.push("ST: " + stItems.join("; ") + ".");
  else if (s.stInf || s.stAnt || s.stLat) lines.push("ST: isoelektrik.");

  /* T & U */
  const twItems = [];
  if (s.tWave && s.tWave !== "normal") {
    const map = {hyper:"hiperakut", peaked:"peaked simetrik",
      deepInv:"inversi dalam simetrik", bi:"bifasik pos‚Üíneg", diff:"inversi difus"};
    twItems.push("T " + (map[s.tWave] || s.tWave));
    if (s.tLead) {
      const lmap = {ant:"anterior", lat:"lateral", inf:"inferior", diffuse:"difus"};
      twItems[twItems.length-1] += " di " + (lmap[s.tLead] || s.tLead);
    }
  }
  if (s.uWave === "prom") twItems.push("U prominent");
  if (s.uWave === "inv") twItems.push("U inverted");
  if (twItems.length > 0) lines.push("Gelombang T/U: " + twItems.join("; ") + ".");

  /* QRS morphology details */
  const qmItems = [];
  if (s.qPath && s.qPath !== "none") {
    const map = {inf:"inferior", ant:"anterior", lat:"lateral"};
    qmItems.push("Q patologis " + map[s.qPath]);
  }
  if (s.rProg === "poor") qmItems.push("poor R progression");
  if (s.voltage === "high") qmItems.push("voltage tinggi (LVH?)");
  if (s.voltage === "low") qmItems.push("voltage rendah difus");
  if (s.delta === "present") qmItems.push("delta wave (pre-excitation)");
  if (s.other && s.other !== "none") {
    const map = {osborn:"Osborn J wave", epsilon:"epsilon wave", fragQrs:"fragmented QRS"};
    qmItems.push(map[s.other]);
  }
  if (qmItems.length > 0) lines.push("Morfologi: " + qmItems.join("; ") + ".");

  /* Kesan & DD */
  if (result.diagnoses.length > 0) {
    const sorted = [...result.diagnoses].sort((a,b) => SEV_ORDER[a.sev] - SEV_ORDER[b.sev]);
    const primary = sorted[0];
    const others = sorted.slice(1, 4);
    lines.push("");
    lines.push("Kesan: " + primary.name + ".");
    if (others.length > 0) {
      lines.push("DD/: " + others.map(d => d.name).join("; ") + ".");
    }
  }

  /* Saran */
  if (result.nextSteps.length > 0) {
    lines.push("");
    lines.push("Saran:");
    result.nextSteps.slice(0, 5).forEach((n, i) => {
      lines.push("  " + (i+1) + ". " + n.text);
    });
  }

  return lines.join("\n");
}

/* ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê
   STATE & EVENT HANDLERS
   ‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê‚ïê */
const formState = {};
let interpTimer = null;

function runInterp() {
  const result = interpretECG(formState);
  renderInterp(result);
}

function scheduleInterp() {
  if (interpTimer) clearTimeout(interpTimer);
  interpTimer = setTimeout(runInterp, 300);
}

/* Pill click: toggle within row */
document.addEventListener("click", function(e) {
  /* Pill toggle */
  if (e.target.classList.contains("pill")) {
    const key = e.target.dataset.key;
    const value = e.target.dataset.value;
    if (!key) return;

    /* Clear all pills in this row, then set active on clicked */
    const row = e.target.parentElement;
    row.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));

    /* Toggle: if same value, deselect */
    if (formState[key] === value) {
      delete formState[key];
    } else {
      formState[key] = value;
      e.target.classList.add("active");
    }
    scheduleInterp();
    return;
  }

  /* Collapse toggle (Tab 1) */
  if (e.target.closest("[data-toggle]")) {
    const header = e.target.closest("[data-toggle]");
    const wrap = header.parentElement;
    const body = wrap.querySelector(".collapse-body");
    const chevron = header.querySelector(".chevron");
    const isOpen = body.classList.contains("open");
    if (isOpen) {
      body.classList.remove("open");
      header.classList.remove("open");
      chevron.classList.remove("open");
    } else {
      body.classList.add("open");
      header.classList.add("open");
      chevron.classList.add("open");
    }
    return;
  }

  /* Collapse toggle (Tab 2) */
  if (e.target.closest("[data-toggle-patho]")) {
    const header = e.target.closest("[data-toggle-patho]");
    const wrap = header.parentElement;
    const body = wrap.querySelector(".collapse-body");
    const chevron = header.querySelector(".chevron");
    const isOpen = body.classList.contains("open");
    if (isOpen) {
      body.classList.remove("open");
      header.classList.remove("open");
      chevron.classList.remove("open");
    } else {
      body.classList.add("open");
      header.classList.add("open");
      chevron.classList.add("open");
    }
    return;
  }

  /* Collapse toggle (Tab 2 ‚Äî sub-card / cond-card) */
  if (e.target.closest("[data-toggle-cond]")) {
    const head = e.target.closest("[data-toggle-cond]");
    const card = head.parentElement;
    card.classList.toggle("open");
    const chevron = head.querySelector(".chevron");
    if (chevron) chevron.classList.toggle("open");
    return;
  }

  /* Dx link ‚Üí switch to Tab 2, open category, open matching sub-card */
  if (e.target.classList.contains("dx-link")) {
    const link = e.target.dataset.link;
    const dxName = e.target.dataset.dxname || "";
    if (!link) return;
    switchTab("patho");
    setTimeout(() => {
      const cat = document.getElementById("cat-"+link);
      if (cat) {
        /* Open the category */
        const header = cat.querySelector(".collapse-header");
        const body = cat.querySelector(".collapse-body");
        const chevron = header.querySelector(".chevron");
        body.classList.add("open");
        header.classList.add("open");
        if (chevron) chevron.classList.add("open");
        /* Try to open matching sub-card by name */
        let targetSubCard = null;
        if (dxName) {
          const subCards = cat.querySelectorAll(".cond-card");
          const dxLower = dxName.toLowerCase();
          subCards.forEach(sc => {
            const subName = sc.querySelector(".cond-name");
            if (subName) {
              const txt = subName.textContent.toLowerCase();
              /* Match on key keyword */
              const dxKey = dxLower.split(/[\s‚Äî()]/).filter(w => w.length > 3)[0] || "";
              if (dxKey && txt.includes(dxKey)) {
                if (!targetSubCard) targetSubCard = sc;
              }
            }
          });
          if (targetSubCard) {
            targetSubCard.classList.add("open");
            const subChev = targetSubCard.querySelector(".cond-card-head .chevron");
            if (subChev) subChev.classList.add("open");
          }
        }
        /* Scroll to target sub-card or category */
        setTimeout(() => {
          (targetSubCard || cat).scrollIntoView({behavior:"smooth", block:"start"});
        }, 350);
      }
    }, 100);
    return;
  }

  /* Copy button */
  if (e.target.id === "copyBtn") {
    const box = document.getElementById("templateBox");
    if (!box) return;
    /* Extract text excluding the button text */
    const text = box.textContent.replace(/^Copy\s*/, "").trim();
    navigator.clipboard.writeText(text).then(() => {
      e.target.classList.add("copied");
      e.target.textContent = "‚úì Disalin!";
      setTimeout(() => {
        e.target.classList.remove("copied");
        e.target.textContent = "Copy";
      }, 1500);
    }).catch(() => {
      e.target.textContent = "‚úó Gagal";
      setTimeout(() => { e.target.textContent = "Copy"; }, 1500);
    });
    return;
  }
});

/* ‚îÄ‚îÄ‚îÄ TAB SWITCHING ‚îÄ‚îÄ‚îÄ */
function switchTab(target) {
  /* Buttons */
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.target === target);
  });
  /* Panels */
  document.querySelectorAll(".tab-panel").forEach(p => {
    p.classList.toggle("active", p.dataset.tab === target);
  });
  /* Reset scroll to top ‚Äî do it on next frame after DOM updates,
     and again after layout settles, so user doesn't land in empty space */
  requestAnimationFrame(() => {
    window.scrollTo(0, 0);
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
    requestAnimationFrame(() => {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
    });
  });
  /* Persist */
  try { sessionStorage.setItem("pulsus-tab", target); } catch (e) { /* ignore */ }
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => switchTab(btn.dataset.target));
});

/* ‚îÄ‚îÄ‚îÄ EXPAND/COLLAPSE ALL ‚îÄ‚îÄ‚îÄ */
function setupExpandAll(btnId, containerId) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.addEventListener("click", () => {
    const container = document.getElementById(containerId);
    const bodies = container.querySelectorAll(".collapse-body");
    const headers = container.querySelectorAll(".collapse-header");
    const chevrons = container.querySelectorAll(".chevron");
    const anyClosed = Array.from(bodies).some(b => !b.classList.contains("open"));
    bodies.forEach(b => b.classList.toggle("open", anyClosed));
    headers.forEach(h => h.classList.toggle("open", anyClosed));
    chevrons.forEach(c => c.classList.toggle("open", anyClosed));
    btn.textContent = anyClosed ? "Collapse All" : "Expand All";
  });
}

/* ‚îÄ‚îÄ‚îÄ RESET BUTTON ‚îÄ‚îÄ‚îÄ */
document.getElementById("resetBtn").addEventListener("click", () => {
  Object.keys(formState).forEach(k => delete formState[k]);
  renderForm();
  runInterp();
});

/* ‚îÄ‚îÄ‚îÄ INIT ‚îÄ‚îÄ‚îÄ */
document.addEventListener("DOMContentLoaded", function() {
  renderNormalTab();
  renderPathoTab();
  renderForm();
  runInterp();
  setupExpandAll("toggleAll", "normalGroups");
  setupExpandAll("toggleAllPatho", "pathoCategories");

  /* Restore active tab */
  try {
    const saved = sessionStorage.getItem("pulsus-tab");
    if (saved && ["normal","patho","algo"].includes(saved)) {
      switchTab(saved);
    }
  } catch (e) { /* ignore */ }
});

/* Init immediately if already loaded */
if (document.readyState === "loading") {
  /* wait for DOMContentLoaded */
} else {
  renderNormalTab();
  renderPathoTab();
  renderForm();
  runInterp();
  setupExpandAll("toggleAll", "normalGroups");
  setupExpandAll("toggleAllPatho", "pathoCategories");
  try {
    const saved = sessionStorage.getItem("pulsus-tab");
    if (saved && ["normal","patho","algo"].includes(saved)) switchTab(saved);
  } catch (e) {}
}

</script>
