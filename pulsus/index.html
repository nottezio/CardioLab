<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Pulsus — EKG Interpretation Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base:#1C1C1E; --bg-surface:#242424; --bg-elevated:#2E2E2E; --bg-hover:#383838;
  --border-dim:#1F2020; --border:#2A2A2A; --border-bright:#3A3A3A;
  --moss-dim:#1A2E1A; --moss-border:#3D6633; --moss:#4E7D42; --moss-light:#7BAB72; --moss-pale:#9EC494; --moss-bright:#9EC494;
  --text-primary:#E8E8E6; --text-secondary:#A0A09E; --text-muted:#606060;
  --red:#C05050; --red-bg:#2A1010; --red-border:#5A2828; --red-text:#E87060;
  --yellow:#D4A020; --amber:#D4A020; --yellow-bg:#2A1F08; --amber-bg:#2A1F08; --yellow-border:#5A4218; --yellow-text:#D4A860;
  --blue:#5090C0; --blue-bg:#0F2030; --blue-border:#25425A; --blue-text:#70A8D4;
  --green:#4E7D42; --green-bg:#142214;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg-base); color: var(--text-primary);
  font-family: 'Outfit', system-ui, sans-serif; font-size: 13px; line-height: 1.55;
  font-weight: 400; min-height: 100vh; padding-bottom: 40px;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
}
::selection { background: var(--moss-dim); color: var(--moss-pale); }
button { font-family: inherit; cursor: pointer; }
table { border-collapse: collapse; width: 100%; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--bg-base); }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 5px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

/* Navbar */
.navbar { position: fixed; top: 0; left: 0; right: 0; height: 56px;
  background: rgba(46,46,46,0.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border); padding: 0 24px;
  display: flex; align-items: center; justify-content: space-between; z-index: 100; }
.brand { display: flex; align-items: baseline; }
.brand .wordmark { font-family: 'Cormorant Garamond', serif; font-size: 24px;
  font-weight: 600; color: var(--moss-light); letter-spacing: .02em; }
.brand .subtitle { font-size: 11px; color: var(--text-muted);
  margin-left: 10px; margin-top: 4px; letter-spacing: .04em; }
.tabs { display: flex; gap: 8px; overflow-x: auto; }
.tab-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted);
  border-radius: 20px; padding: 6px 16px; font-size: 12px; white-space: nowrap;
  transition: all .2s ease; font-weight: 400; }
.tab-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
.tab-btn.active { background: var(--moss-dim); border-color: var(--moss);
  color: var(--moss-bright); font-weight: 500; }

/* Main + tab panel transitions */
.main { margin-top: 56px; padding: 24px; min-height: calc(100vh - 56px - 40px); position: relative; }
.tab-panel { opacity: 0; pointer-events: none; position: absolute;
  inset: 24px 24px auto 24px; transition: opacity .2s ease; }
.tab-panel.active { opacity: 1; pointer-events: auto; position: relative; inset: auto; }

/* WIP footer */
.wip-footer { position: fixed; bottom: 0; left: 0; right: 0; height: 40px;
  background: var(--bg-elevated); border-top: 1px solid var(--border);
  border-left: 3px solid var(--moss); padding: 0 20px;
  display: flex; align-items: center; font-size: 11px; color: var(--text-muted);
  z-index: 99; letter-spacing: .02em; }

/* Shared components */
.card { background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 12px;
  padding: 16px 20px; transition: border-color .2s ease; }
.card:hover { border-color: var(--border-bright); }

.badge { display: inline-block; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 5px;
  letter-spacing: .02em; white-space: nowrap; }
.badge-moss { background: var(--moss-dim); color: var(--moss-bright); border: 1px solid var(--moss-border); }
.badge-red { background: var(--red-bg); color: var(--red-text); border: 1px solid var(--red-border); }
.badge-yellow { background: var(--yellow-bg); color: var(--yellow-text); border: 1px solid var(--yellow-border); }
.badge-blue { background: var(--blue-bg); color: var(--blue-text); border: 1px solid var(--blue-border); }
.badge-grey { background: var(--bg-surface); color: var(--text-muted); border: 1px solid var(--border); }

.note-box { border-radius: 8px; padding: 10px 14px; font-size: 12px; line-height: 1.55; margin-top: 10px; }
.note-red { background: var(--red-bg); border-left: 3px solid var(--red); color: #E0A090; }
.note-yellow { background: var(--yellow-bg); border-left: 3px solid var(--yellow); color: #D4B870; }
.note-moss { background: var(--green-bg); border-left: 3px solid var(--moss); color: var(--moss-bright); }
.note-blue { background: var(--blue-bg); border-left: 3px solid var(--blue); color: #80B4D8; }

.section-label { font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; margin-top: 24px; }
.section-label:first-child { margin-top: 0; }

/* Collapsible */
.collapse-wrap { margin-bottom: 12px; }
.collapse-header { display: flex; align-items: center; justify-content: space-between;
  cursor: pointer; padding: 14px 20px; background: var(--bg-elevated);
  border: 1px solid var(--border); border-radius: 10px;
  transition: all .2s; gap: 12px; }
.collapse-header:hover { border-color: var(--border-bright); background: var(--bg-hover); }
.collapse-header.open { border-color: var(--moss-dim);
  border-bottom-left-radius: 0; border-bottom-right-radius: 0;
  border-bottom-color: var(--border-dim); }
.collapse-header-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
.collapse-title { font-family: 'Cormorant Garamond', serif; font-size: 18px;
  color: var(--text-primary); font-weight: 600; letter-spacing: .015em; }
.collapse-header-right { display: flex; align-items: center; gap: 10px; }
.collapse-body { background: var(--bg-surface); border: 1px solid var(--border);
  border-top: none; border-bottom-left-radius: 10px; border-bottom-right-radius: 10px;
  overflow: hidden; max-height: 0;
  transition: max-height .35s cubic-bezier(.4,0,.2,1); }
.collapse-body.open { max-height: 8000px; }
.collapse-body-inner { padding: 16px 20px 20px; }
.chevron { transition: transform .3s ease; color: var(--text-muted); font-size: 14px;
  display: inline-block; width: 14px; text-align: center; }
.chevron.open { transform: rotate(180deg); }

/* Range bar */
.range-bar { display: flex; height: 6px; border-radius: 3px; overflow: hidden;
  margin: 6px 0; background: var(--bg-base); }
.range-seg { height: 100%; }
.range-normal { position: relative; }
.range-ticks { display: flex; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace; font-size: 9px;
  color: var(--text-muted); margin-top: 3px; }

/* Outline buttons */
.btn-outline { background: transparent; border: 1px solid var(--moss); color: var(--moss-light);
  border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: 500;
  letter-spacing: .04em; transition: all .15s ease; }
.btn-outline:hover { background: var(--moss-dim); border-color: var(--moss-light); color: var(--moss-pale); }
.btn-outline-red { background: transparent; border: 1px solid var(--red); color: var(--red-text);
  border-radius: 6px; padding: 6px 12px; font-size: 11px; font-weight: 500;
  letter-spacing: .04em; transition: all .15s ease; }
.btn-outline-red:hover { background: var(--red-bg); color: #F08070; }

/* TAB 1 — Nilai Normal */
.tab1-controls { display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; gap: 16px; }
.tab1-controls h2 { font-family: 'Cormorant Garamond', serif; font-size: 22px;
  font-weight: 600; color: var(--text-primary); letter-spacing: .015em; }
.tab1-controls h2 .sub { font-family: 'Outfit', sans-serif; font-size: 11px;
  font-weight: 400; color: var(--text-muted); margin-left: 10px; letter-spacing: .04em; }

.param-table { width: 100%; }
.param-table thead th { background: var(--bg-base); font-size: 10px; color: var(--text-muted);
  font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
  padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
.param-table tbody tr { border-bottom: 1px solid var(--border-dim);
  transition: background .15s ease; }
.param-table tbody tr:hover { background: var(--bg-hover); }
.param-table tbody tr:last-child { border-bottom: none; }
.param-table td { padding: 14px; vertical-align: top; font-size: 12px; }

.param-name { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--text-primary); margin-bottom: 4px; }
.param-formula { font-style: italic; font-size: 11px; color: var(--text-muted); margin-top: 4px; }
.param-value { font-family: 'JetBrains Mono', monospace; font-size: 14px; font-weight: 500; color: var(--moss-bright); }
.param-unit { font-size: 10px; color: var(--text-muted); margin-top: 3px; }
.param-sex { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--moss-bright); line-height: 1.5; }
.param-sex .sex-tag { color: var(--text-muted); font-size: 10px; margin-right: 4px; }
.param-clinical { color: var(--text-secondary); max-width: 320px; font-size: 12px; line-height: 1.5; }
.param-clinical strong { color: var(--text-primary); font-weight: 500; }
.col-param { width: 22%; } .col-value { width: 16%; } .col-range { width: 28%; } .col-clin { width: 34%; }

/* Citation tag */
.cite-tag { display: inline-block; font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text-muted); border: 1px dashed var(--border-bright);
  padding: 1px 5px; border-radius: 3px; margin-left: 6px; letter-spacing: .02em; }

/* TAB 2 — Patofisiologi */
.cat-wrap { margin-bottom: 14px; border-left: 3px solid transparent; }
.cat-wrap.urgency-emergency { border-left-color: var(--red); }
.cat-wrap.urgency-urgent { border-left-color: var(--yellow); }
.cat-wrap.urgency-monitor { border-left-color: var(--blue); }
.cat-wrap.urgency-structural { border-left-color: var(--moss); }
.cat-header { padding-left: 17px; }
.cat-letter { font-family: 'Cormorant Garamond', serif; font-size: 18px;
  font-weight: 700; color: var(--moss-light); margin-right: 8px; }
.cat-count { font-family: 'JetBrains Mono', monospace; font-size: 10px;
  color: var(--text-muted); background: var(--bg-surface); border: 1px solid var(--border);
  border-radius: 4px; padding: 1px 6px; }
.cond-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
@media (max-width: 980px) { .cond-grid { grid-template-columns: 1fr; } }
.cond-card { background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px; }
.cond-head { display: flex; align-items: flex-start; justify-content: space-between;
  gap: 10px; margin-bottom: 10px; }
.cond-name { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600;
  color: var(--text-primary); letter-spacing: .01em; }
.cond-mech { font-style: italic; font-size: 12px; color: var(--text-secondary);
  margin-bottom: 12px; line-height: 1.55; }
.cond-criteria-table { margin: 10px 0; font-size: 11px; }
.cond-criteria-table th { text-align: left; font-family: 'Outfit', sans-serif;
  font-size: 9px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--text-muted); font-weight: 600; padding: 6px 10px;
  border-bottom: 1px solid var(--border); }
.cond-criteria-table td { padding: 7px 10px; font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text-primary); border-bottom: 1px solid var(--border-dim); }
.cond-criteria-table td.label-cell { font-family: 'Outfit', sans-serif; color: var(--text-secondary); }
.cond-criteria-table tr:hover td { background: var(--bg-hover); }
.cond-criteria-table tr:last-child td { border-bottom: none; }
.cond-clinical-block { background: var(--bg-base); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 14px; font-size: 12px;
  font-family: 'JetBrains Mono', monospace; line-height: 1.8;
  margin: 10px 0; color: var(--text-primary); white-space: pre-wrap; }
.cond-clinical-block .clin-title { font-family: 'Outfit', sans-serif; font-size: 11px;
  font-weight: 600; color: var(--moss-bright); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: .06em; }

/* TAB 3 — Algoritma */
.algo-grid { display: grid; grid-template-columns: 55% 45%; gap: 20px;
  height: calc(100vh - 56px - 40px - 48px); }
@media (max-width: 980px) { .algo-grid { grid-template-columns: 1fr; height: auto; } }
.algo-col { overflow-y: auto; padding-right: 4px; }
.algo-col-head { display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 16px; gap: 12px; }
.algo-col-title { font-family: 'Cormorant Garamond', serif; font-size: 18px;
  font-weight: 600; color: var(--text-primary); letter-spacing: .015em; }
.algo-col-title.interp { color: var(--moss-light); }
.form-group { background: var(--bg-elevated); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px; margin-bottom: 12px;
  transition: border-color .2s ease; }
.form-group:hover { border-color: var(--border-bright); }
.form-group-label { font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px; }
.form-group-label .letter { display: inline-block; width: 18px; height: 18px;
  border-radius: 50%; background: var(--moss-dim); border: 1px solid var(--moss-border);
  color: var(--moss-pale); font-family: 'JetBrains Mono', monospace;
  font-size: 10px; text-align: center; line-height: 17px; font-weight: 600; }
.form-row { margin-bottom: 12px; }
.form-row:last-child { margin-bottom: 0; }
.form-row-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
.pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
.pill { background: var(--bg-surface); border: 1px solid var(--border);
  color: var(--text-muted); padding: 6px 12px; border-radius: 6px;
  font-size: 12px; cursor: pointer; transition: all .15s ease;
  font-family: 'Outfit', sans-serif; }
.pill:hover { border-color: var(--border-bright); color: var(--text-primary); }
.pill.active { background: var(--moss-dim); border-color: var(--moss);
  color: var(--moss-bright); font-weight: 500; }

/* Interpretation panel */
.completeness { display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
  font-size: 10px; color: var(--text-muted); letter-spacing: .06em; text-transform: uppercase; }
.completeness-bar { flex: 1; height: 4px; background: var(--bg-base);
  border-radius: 2px; overflow: hidden; }
.completeness-fill { height: 100%; background: var(--moss); transition: width .3s ease; }
.interp-section { margin-bottom: 18px; }
.interp-section-title { font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px; }
.interp-empty { font-style: italic; color: var(--text-muted);
  text-align: center; padding: 16px; font-size: 12px; }
.finding-list { list-style: none; }
.finding-item { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
  font-size: 12px; color: var(--text-primary); animation: slideUp .15s ease; }
.finding-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex-shrink: 0; }
.finding-dot.red { background: var(--red); }
.finding-dot.yellow { background: var(--yellow); }
.finding-dot.blue { background: var(--blue); }
.finding-dot.green { background: var(--moss); }
.finding-dot.grey { background: var(--text-muted); }
@keyframes slideUp { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

.dx-card { background: var(--bg-base); border: 1px solid var(--border);
  border-left: 3px solid var(--text-muted); border-radius: 8px;
  padding: 10px 14px; margin-bottom: 8px; animation: slideUp .15s ease; }
.dx-card.sev-red { border-left-color: var(--red); }
.dx-card.sev-yellow { border-left-color: var(--yellow); }
.dx-card.sev-blue { border-left-color: var(--blue); }
.dx-card.sev-green { border-left-color: var(--moss); }
.dx-card.sev-grey { border-left-color: var(--text-muted); }
.dx-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.dx-name { font-weight: 500; font-size: 13px; color: var(--text-primary); }
.dx-conf { font-family: 'JetBrains Mono', monospace; font-size: 10px;
  padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
.dx-conf.high { background: var(--moss-dim); color: var(--moss-bright); border: 1px solid var(--moss-border); }
.dx-conf.medium { background: var(--yellow-bg); color: var(--yellow-text); border: 1px solid var(--yellow-border); }
.dx-conf.consider { background: var(--blue-bg); color: var(--blue-text); border: 1px solid var(--blue-border); }
.dx-support { font-size: 11px; color: var(--text-secondary); margin: 4px 0 6px; padding-left: 16px; }
.dx-support li { list-style: '·  '; padding: 2px 0; }
.dx-link { display: inline-block; font-size: 11px; color: var(--moss-light);
  cursor: pointer; margin-top: 4px; border: none; background: transparent; padding: 0; }
.dx-link:hover { color: var(--moss-pale); text-decoration: underline; }

.next-step { display: flex; align-items: flex-start; gap: 10px; padding: 6px 0;
  font-size: 12px; color: var(--text-primary); }
.next-step .cb { display: inline-block; width: 13px; height: 13px;
  border: 1.5px solid var(--text-muted); border-radius: 3px; margin-top: 3px; flex-shrink: 0; }

.template-box { background: var(--bg-base); border: 1px solid var(--border);
  border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 11px;
  color: var(--text-secondary); padding: 14px; line-height: 1.9; white-space: pre-wrap;
  position: relative; word-break: break-word; }
.copy-btn { position: absolute; top: 8px; right: 8px;
  background: var(--moss-dim); border: 1px solid var(--moss-border);
  color: var(--moss-pale); border-radius: 5px; padding: 3px 9px;
  font-size: 10px; font-family: 'Outfit', sans-serif; cursor: pointer;
  transition: all .15s ease; letter-spacing: .04em; }
.copy-btn:hover { background: var(--moss-border); color: var(--moss-pale); }
.copy-btn.copied { background: var(--moss); color: #fff; }

/* Mobile */
@media (max-width: 768px) {
  .navbar { padding: 0 14px; } .brand .subtitle { display: none; }
  .tabs { gap: 4px; } .tab-btn { padding: 5px 12px; font-size: 11px; }
  .main { padding: 14px; } .tab-panel { inset: 14px 14px auto 14px; }
  .col-param, .col-value, .col-range, .col-clin { width: auto; }
  .param-table thead { display: none; }
  .param-table tbody tr { display: block; padding: 12px 14px; border-bottom: 1px solid var(--border); }
  .param-table td { display: block; padding: 4px 0; }
  .param-clinical { max-width: none; }
  .wip-footer { font-size: 10px; padding: 0 12px; }
}
/* Print */
@media print {
  body { background: #fff; color: #000; }
  .navbar, .wip-footer, .tab1-controls, .algo-grid { display: none !important; }
  .tab-panel { opacity: 1 !important; position: relative !important; inset: auto !important; pointer-events: auto !important; }
  .tab-panel[data-tab="algo"] { display: none !important; }
  .collapse-body { max-height: none !important; }
  .collapse-body, .collapse-header { background: #fff !important; color: #000 !important; border-color: #ccc !important; }
  .main { margin-top: 0; padding: 0; }
  .card, .cond-card, .form-group { background: #fff !important; border-color: #ccc !important; }
  table, tr, td, th { color: #000 !important; }
  * { color-adjust: exact; -webkit-print-color-adjust: exact; }
}
</style>
</head>
<body>
<nav class="navbar">
  <div class="brand">
    <span class="wordmark">Pulsus</span>
    <span class="subtitle">EKG Interpretation Guide</span>
  </div>
  <div class="tabs" id="tabs">
    <button class="tab-btn active" data-target="normal">Nilai Normal</button>
    <button class="tab-btn" data-target="patho">Patofisiologi</button>
    <button class="tab-btn" data-target="algo">Algoritma</button>
  </div>
</nav>
<main class="main">
  <section class="tab-panel active" data-tab="normal" id="tab-normal">
    <div class="tab1-controls">
      <h2>Nilai Normal EKG<span class="sub">parameter standar dewasa</span></h2>
      <button class="btn-outline" id="toggleAll">Expand All</button>
    </div>
    <div id="normalGroups"></div>
  </section>
  <section class="tab-panel" data-tab="patho" id="tab-patho">
    <div class="tab1-controls">
      <h2>Patofisiologi<span class="sub">kategori klinis &amp; kriteria diagnostik</span></h2>
      <button class="btn-outline" id="toggleAllPatho">Expand All</button>
    </div>
    <div id="pathoCategories"></div>
  </section>
  <section class="tab-panel" data-tab="algo" id="tab-algo">
    <div class="algo-grid">
      <div class="algo-col" id="algoFormCol">
        <div class="algo-col-head">

    {key:"delta", label:"Delta wave", opts:[
      {v:"none", t:"Tidak ada"}, {v:"present", t:"Ada — slurred upstroke"}]},
    {key:"other", label:"Temuan lain", opts:[
      {v:"none", t:"Tidak ada"}, {v:"osborn", t:"Osborn J wave"},
      {v:"epsilon", t:"Epsilon wave"}, {v:"fragQrs", t:"Fragmented QRS"}]},
  ]},
];

/* ═══════════════════════════════════════════════════════════
   ENGINE — interpretECG (pure function)
   ═══════════════════════════════════════════════════════ */
function interpretECG(s) {
  const findings = [];
  const diagnoses = [];
  const warnings = [];
  const nextSteps = [];
  const conflicts = [];
  const has = (k, v) => s[k] === v;
  const any = (k, ...vals) => vals.includes(s[k]);
  const set = (k) => s[k] !== null && s[k] !== undefined;
  const addStep = (txt) => { if (!nextSteps.find(n => n.text === txt)) nextSteps.push({text:txt}); };

  /* Completeness */
  const groupKeys = {
    tech:["speed","cal","leads"], rate:["rate","rhythm","pwave","pqrs"],
    intervals:["pr","qrsDur","qrsMorph","qtc"], axis:["axis"],
    st:["stInf","stAnt","stLat","stAvr","stMorph","prSeg"],
    twu:["tWave","tLead","uWave"],
    qrsMorph2:["qPath","rProg","voltage","delta","other"],
  };
  let groupsFilled = 0;
  Object.values(groupKeys).forEach(keys => {
    if (keys.some(k => set(k))) groupsFilled++;
  });

  /* Conflict detection */
  if (has("pwave","absent") && has("pr","120-200")) {
    conflicts.push({text:"P wave 'tidak ada' bertentangan dengan PR interval 120–200 ms — periksa ulang."});
  }
  if (has("qrsDur","lt120") && any("qrsMorph","rbbb","lbbb")) {
    conflicts.push({text:"QRS <120 ms tidak konsisten dengan BBB lengkap — periksa ulang."});
  }
  if (has("pqrs","diss") && has("pwave","absent")) {
    conflicts.push({text:"AV disosiasi memerlukan P wave terlihat — periksa ulang."});
  }

  /* ─── TIER 1: EMERGENCY ─── */

  /* VF */
  if (has("rhythm","irregIrreg") && has("pwave","absent") &&
      (has("qrsMorph","vt") || has("qrsDur","gte150"))) {
    diagnoses.push({sev:"red", conf:"high", name:"Ventricular Fibrillation (VF)",
      supports:["Irama irregularly irregular","Tidak ada P wave","QRS tidak teridentifikasi"], link:"arr"});
    findings.push({sev:"red", text:"💥 Pola konsisten dengan VF — defibrilasi segera"});
    addStep("DEFIBRILASI segera (unsynchronized)");
    addStep("Mulai CPR berkualitas tinggi");
    addStep("Aktivasi code blue / resus team");
  }

  /* VT */
  if (any("rate","100-150","gt150") && any("qrsDur","120-149","gte150")) {
    const pro = [];
    if (has("pqrs","diss")) pro.push("AV disosiasi");
    if (has("qrsMorph","vt")) pro.push("Pattern VT");
    if (has("axis","extreme")) pro.push("Extreme axis");
    if (has("qrsDur","gte150")) pro.push("QRS ≥150 ms");
    const isVT = pro.length >= 1;
    if (isVT) {
      diagnoses.push({sev:"red", conf: pro.length >= 2 ? "high" : "medium",
        name:"Ventricular Tachycardia (VT)",
        supports:["Rate >100","QRS ≥120 ms",...pro], link:"arr"});
      findings.push({sev:"red", text:"⚠️ Wide-complex tachycardia — assume VT sampai terbukti sebaliknya"});
      addStep("Cek hemodinamik — jika unstable: kardioversi sinkron 100–200 J");
      addStep("Stable VT: amiodarone 150 mg IV / procainamide 20–50 mg/min");
      addStep("Konsultasi kardiologi segera");
      warnings.push({text:"Wide-complex tachycardia: konfirmasi dengan Brugada algorithm. JANGAN beri AVN blocker jika WPW-AF dicurigai."});
    } else {
      diagnoses.push({sev:"yellow", conf:"medium",
        name:"Wide-complex tachycardia (VT vs SVT-aberrancy)",
        supports:["Rate >100","QRS ≥120 ms"], link:"arr"});
      warnings.push({text:"Wide-complex tachycardia tanpa AV disosiasi terlihat: gunakan Brugada algorithm, atau treat as VT jika unstable."});
    }
  }

  /* CHB */
  if (has("pqrs","diss") || has("pqrs","moreP")) {
    diagnoses.push({sev:"red", conf:"high", name:"AV Block derajat 3 (CHB)",
      supports:[has("pqrs","diss") ? "AV disosiasi total" : "P lebih banyak dari QRS",
        s.rate ? "Rate "+s.rate : "Rate variable"], link:"cond"});
    findings.push({sev:"red", text:"⚠️ AV block lengkap — disosiasi atrium-ventrikel"});
    addStep("Persiapkan pacing transkutan; konsultasi cardiologi STAT");
    addStep("Atropin 0.5–1 mg IV (limited efficacy pada CHB)");
    addStep("Periksa K⁺, obat AVN-blocker, troponin (inferior MI)");
  }

  /* STEMI Inferior */
  if (has("stInf","ste")) {
    const supp = ["STE inferior (II/III/aVF) ≥1 mm"];
    if (has("stLat","std") || has("stAnt","std")) supp.push("Reciprocal STD");
    diagnoses.push({sev:"red", conf:"high", name:"STEMI Inferior",
      supports: supp, link:"acs"});
    findings.push({sev:"red", text:"💢 STE inferior — STEMI inferior (RCA/LCx)"});
    addStep("Aktivasi cath lab — door-to-balloon <90 menit");
    addStep("Rekam right-sided V3R–V4R (RV infarct → hindari nitrat)");
    addStep("Aspirin 162–325 mg + P2Y12 inhibitor sesuai protokol");
    addStep("Heparin/enoxaparin sesuai protokol");
  }

  /* STEMI Anterior */
  if (has("stAnt","ste")) {
    const supp = ["STE anterior (V1–V4) memenuhi threshold sex-specific"];
    if (has("stInf","std")) supp.push("Reciprocal STD inferior");
    diagnoses.push({sev:"red", conf:"high", name:"STEMI Anterior",
      supports: supp, link:"acs"});
    findings.push({sev:"red", text:"💢 STE anterior — STEMI anterior (LAD)"});
    addStep("Aktivasi cath lab — door-to-balloon <90 menit");
    addStep("Aspirin 162–325 mg + P2Y12 inhibitor");
    addStep("Echocardiogram untuk EF dan komplikasi mekanik");
  }

  /* STEMI Lateral */
  if (has("stLat","ste") && !has("stAnt","ste") && !has("stInf","ste")) {
    diagnoses.push({sev:"red", conf:"high", name:"STEMI Lateral",
      supports:["STE lateral (I/aVL/V5–V6) ≥1 mm"], link:"acs"});
    findings.push({sev:"red", text:"💢 STE lateral — STEMI lateral (LCx/diagonal)"});
    addStep("Aktivasi cath lab");
  }

  /* aVR STE — LMCA/3VD */
  if (has("stAvr","ste") && (has("stInf","std") || has("stAnt","std") || has("stLat","std"))) {
    diagnoses.push({sev:"red", conf:"high", name:"aVR STE + diffuse STD — LMCA/3VD",
      supports:["STE aVR","Diffuse STD di teritori lain"], link:"acs"});
    findings.push({sev:"red", text:"⚠️ aVR STE >1 mm + diffuse STD → curiga LMCA atau 3-vessel disease"});
    addStep("Aktivasi cath lab segera — mortality risk sangat tinggi");
  }

  /* Brugada Type 1 */
  if (has("stAnt","coved")) {
    diagnoses.push({sev:"red", conf:"high", name:"Brugada Type 1 (coved STE V1–V2)",
      supports:["Coved STE V1–V2 ≥2 mm"], link:"her"});
    findings.push({sev:"red", text:"⚡ Brugada Type 1 pattern — risiko VF idiopathic"});
    addStep("Cek triggering factors: demam, hipokalemia, obat (Na blocker)");
    addStep("Konsultasi electrophysiology — pertimbangkan ICD");
    addStep("Family screening");
  }

  /* De Winter */
  if (has("stAnt","std") && (has("tWave","hyper") || has("tWave","peaked")) &&
      has("tLead","ant") && has("stMorph","up")) {
    diagnoses.push({sev:"red", conf:"high", name:"De Winter T-waves (STEMI-equivalent)",
      supports:["Upsloping STD anterior ≥1 mm di J-point","Tall symmetric T waves anterior"], link:"acs"});
    findings.push({sev:"red", text:"💢 De Winter pattern — LAD oklusi total/kritis (STEMI-equivalent)"});
    addStep("Aktivasi cath lab — treat as STEMI");
    warnings.push({text:"De Winter klasifikasi formal bukan STEMI klasik, tetapi >90% kasus = LAD oklusi total. Treat sebagai STEMI-equivalent."});
  }

  /* Wellens */
  if (!has("stAnt","ste") && has("tLead","ant") &&
      (has("tWave","bi") || has("tWave","deepInv")) && any("rProg","normal")) {
    diagnoses.push({sev:"red", conf:"high", name:"Wellens Syndrome (LAD kritikal)",
      supports:[
        has("tWave","bi") ? "Biphasic T (pos→neg) di V2–V3" : "Deep symmetric inverted T di V2–V3",
        "R wave progression preserved","Tidak ada Q wave atau STE significant"
      ], link:"acs"});
    findings.push({sev:"red", text:"⚡ Wellens pattern — stenosis kritikal proximal LAD"});
    addStep("Cath lab dalam 24–48 jam (urgent, bukan emergent)");
    addStep("JANGAN stress test — bisa precipitate complete occlusion");
  }

  /* Posterior STEMI */
  if (has("stAnt","std") && has("rProg","early")) {
    diagnoses.push({sev:"red", conf:"high", name:"Posterior STEMI",
      supports:["STD anterior (V1–V3)","Tall R wave V1–V3 (mirror)","Curiga LCx atau RCA"], link:"acs"});
    findings.push({sev:"red", text:"💢 STD V1–V3 + tall R — kemungkinan posterior STEMI"});
    addStep("Rekam leads posterior V7–V9 (STE ≥0.5 mm = diagnostic)");
    addStep("Aktivasi cath lab jika V7–V9 konfirmasi");
  } else if (has("stAnt","std")) {
    warnings.push({text:"STD V1–V3 isolated: rule out posterior STEMI. Rekam V7–V9 selalu."});
    addStep("Rekam leads posterior V7–V9");
  }

  /* Hyperacute T */
  if (has("tWave","hyper") && !has("stAnt","ste") && !has("stInf","ste") && !has("stLat","ste")) {
    diagnoses.push({sev:"red", conf:"medium", name:"Hyperacute T waves — earliest STEMI sign",
      supports:["Tall broad asymmetric T waves","Belum ada STE definite"], link:"acs"});
    findings.push({sev:"red", text:"⚠️ Hyperacute T — kemungkinan early STEMI"});
    addStep("Serial EKG setiap 15 menit — STE bisa develop");
    addStep("Troponin serial; treat sebagai high-risk ACS");
  }

  /* ─── TIER 2: URGENT ─── */

  /* New LBBB at high rate */
  if (has("qrsMorph","lbbb") && any("rate","100-150","gt150")) {
    diagnoses.push({sev:"yellow", conf:"medium", name:"LBBB dengan tachycardia",
      supports:["LBBB pattern","Rate >100"], link:"cond"});
    warnings.push({text:"LBBB + nyeri dada: gunakan kriteria Sgarbossa / Modified Sgarbossa untuk identifikasi STEMI."});
    addStep("Bandingkan dengan EKG lama — LBBB baru?");
  }

  /* 2° AVB Mobitz I */
  if (has("pr","varProg")) {
    diagnoses.push({sev:"blue", conf:"high", name:"AV Block derajat 2 Mobitz I (Wenckebach)",
      supports:["PR memanjang progresif sebelum dropped beat"], link:"cond"});
    findings.push({sev:"blue", text:"AV block 2° Mobitz I (Wenckebach) — biasanya benign, AVN-level"});
    addStep("Monitor; biasanya tidak perlu pacing kecuali simptomatik");
    addStep("Cek obat AVN-blocker, tone vagal, iskemia inferior");
  }

  /* QTc >500 — TdP risk */
  if (has("qtc","gt500")) {
    diagnoses.push({sev:"yellow", conf:"high", name:"QTc >500 ms — risiko TdP tinggi",
      supports:["QTc >500 ms"], link:"elec"});
    findings.push({sev:"yellow", text:"⚠️ QTc >500 ms — high risk Torsades de Pointes"});
    addStep("Stop semua obat QT-prolonging (cek CredibleMeds)");
    addStep("Cek K⁺, Mg²⁺, Ca²⁺ STAT — koreksi K⁺ >4.0, Mg >2.0");
    addStep("Pertimbangkan Mg sulfate 2g IV profilaksis");
    addStep("Cardiac monitor kontinyu");
  }

  /* Severe hyperkalemia */
  if (has("pwave","absent") && has("qrsDur","gte150") && has("tWave","peaked")) {
    diagnoses.push({sev:"red", conf:"high", name:"Hyperkalemia berat (suspect)",
      supports:["P wave absent","QRS lebar ≥150 ms","T wave peaked"], link:"elec"});
    findings.push({sev:"red", text:"⚡ Hyperkalemia berat — pre-arrest pattern"});
    addStep("Calcium gluconate 1g IV STAT (membrane stabilization)");
    addStep("Insulin 10U + D50 1 ampul (intracellular shift)");
    addStep("Cek K⁺ serum + EKG serial");
    addStep("Pertimbangkan hemodialisis emergent");
  } else if (has("tWave","peaked")) {
    diagnoses.push({sev:"yellow", conf:"medium", name:"Peaked T waves — kemungkinan hyperkalemia",
      supports:["T wave peaked narrow"], link:"elec"});
    findings.push({sev:"yellow", text:"T peaked — cek K⁺ serum"});
    addStep("Cek K⁺ serum STAT");
  }

  /* ─── TIER 3: MONITOR ─── */

  /* AF */
  if (has("rhythm","irregIrreg") && has("pwave","absent") && any("qrsDur","lt120","120-149")) {
    let label = "Atrial Fibrillation";
    if (s.rate === "gt150" || s.rate === "100-150") label += " (rapid ventricular response)";
    else if (s.rate === "lt40") label += " (slow ventricular response)";
    diagnoses.push({sev:"blue", conf:"high", name: label,
      supports:["Irregularly irregular","Tidak ada P wave"], link:"arr"});
    findings.push({sev:"blue", text:"Atrial fibrillation"});
    addStep("Hitung CHA₂DS₂-VASc dan HAS-BLED — pertimbangkan antikoagulasi");
    if (s.rate === "gt150" || s.rate === "100-150") {
      addStep("Rate control: BB atau CCB (verapamil/diltiazem) — kecuali HF lanjut");
    }
  }

  /* SVT */
  if (any("rate","100-150","gt150") && has("rhythm","reg") && has("qrsDur","lt120") &&
      any("pwave","absent","retro")) {
    diagnoses.push({sev:"blue", conf:"medium", name:"SVT (AVNRT / AVRT)",
      supports:["Rate >100","QRS sempit","P absent atau retrograde","Regular"], link:"arr"});
    findings.push({sev:"blue", text:"Narrow-complex tachycardia regular — SVT pattern"});
    addStep("Maneuver vagal (Valsalva modified)");
    addStep("Adenosine 6 mg IV push → 12 mg jika gagal");
    addStep("Jika unstable: kardioversi sinkron 50–100 J");
  }

  /* Sinus brady/tachy */
  if (has("rhythm","reg") && has("pwave","normal") && has("pqrs","1to1")) {
    if (any("rate","lt40","40-60")) {
      diagnoses.push({sev:"blue", conf:"high", name:"Sinus Bradycardia",
        supports:["Rate <60","P normal","1:1 conduction"], link:"arr"});
      findings.push({sev:"blue", text:"Sinus bradycardia"});
    } else if (any("rate","100-150","gt150")) {
      diagnoses.push({sev:"blue", conf:"high", name:"Sinus Tachycardia",
        supports:["Rate >100","P normal","1:1 conduction"], link:"arr"});
      findings.push({sev:"blue", text:"Sinus tachycardia — cari etiologi (demam, dehidrasi, anemia)"});
    }
  }

  /* 1° AVB */
  if (has("pr","gt200")) {
    diagnoses.push({sev:"blue", conf:"high", name:"AV Block derajat 1",
      supports:["PR >200 ms","1:1 conduction"], link:"cond"});
    findings.push({sev:"blue", text:"PR memanjang — AV block 1° (biasanya benign)"});
  }

  /* RBBB */
  if (has("qrsMorph","rbbb") && any("qrsDur","120-149","gte150")) {
    diagnoses.push({sev:"blue", conf:"high", name:"Right Bundle Branch Block (RBBB)",
      supports:["rSR' V1","QRS ≥120 ms"], link:"cond"});
    findings.push({sev:"blue", text:"RBBB pattern"});
  }

  /* LBBB (without tachy already handled above) */
  if (has("qrsMorph","lbbb") && any("qrsDur","120-149","gte150") &&
      !any("rate","100-150","gt150")) {
    diagnoses.push({sev:"blue", conf:"high", name:"Left Bundle Branch Block (LBBB)",
      supports:["Broad R I/V6, QS V1","QRS ≥120 ms"], link:"cond"});
    findings.push({sev:"blue", text:"LBBB pattern"});
    warnings.push({text:"LBBB + nyeri dada: gunakan kriteria Sgarbossa untuk evaluasi STEMI."});
  }

  /* LAFB */
  if (has("axis","lad") && !has("qrsMorph","lbbb")) {
    diagnoses.push({sev:"blue", conf:"medium", name:"Left Anterior Fascicular Block (LAFB)",
      supports:["LAD < −30°","QRS biasanya <120 ms"], link:"cond"});
  }
  /* LPFB */
  if (has("axis","rad") && !has("qrsMorph","rbbb")) {
    diagnoses.push({sev:"blue", conf:"consider", name:"Left Posterior Fascicular Block (LPFB)",
      supports:["RAD > +90°","Eksklusi RVH, PE, lateral MI diperlukan"], link:"cond"});
    warnings.push({text:"RAD: eksklusi RVH, PE acute, lateral MI sebelum diagnosa LPFB (jarang isolated)."});
  }

  /* Bifascicular */
  if (has("qrsMorph","rbbb") && has("axis","lad")) {
    diagnoses.push({sev:"yellow", conf:"high", name:"Bifascicular Block (RBBB + LAFB)",
      supports:["RBBB + LAD"], link:"cond"});
    if (has("pr","gt200")) {
      diagnoses.push({sev:"yellow", conf:"medium", name:"Trifascicular block (incomplete)",
        supports:["Bifascicular + PR memanjang"], link:"cond"});
    }
  }

  /* QTc borderline-prolonged */
  if (has("qtc","gt470")) {
    diagnoses.push({sev:"yellow", conf:"medium", name:"QTc prolonged (>470 ms)",
      supports:["QTc >470 ms"], link:"elec"});
    findings.push({sev:"yellow", text:"QTc prolonged"});
    addStep("Review obat QT-prolonging; cek K⁺, Mg²⁺");
  }

  /* LVH voltage */
  if (has("voltage","high")) {
    diagnoses.push({sev:"blue", conf:"medium", name:"LVH (suspect — voltage criteria)",
      supports:["Voltage tinggi precordial/limb"], link:"hyp"});
    findings.push({sev:"blue", text:"Voltage tinggi — suspect LVH"});
    addStep("Konfirmasi dengan echocardiogram");
  }

  /* WPW */
  if (has("delta","present") || (has("pr","lt120") && has("qrsDur","120-149"))) {
    diagnoses.push({sev:"yellow", conf:"high", name:"WPW Syndrome (pre-excitation)",
      supports:[has("delta","present") ? "Delta wave (slurred upstroke)" : "PR <120 + QRS >120",
        "Pre-excitation pattern"], link:"cond"});
    findings.push({sev:"yellow", text:"⚡ Pre-excitation pattern — WPW"});
    warnings.push({text:"WPW + AF: KONTRAINDIKASI adenosine/BB/CCB/digoksin. Gunakan procainamide atau kardioversi."});
    addStep("Konsultasi electrophysiology untuk risk stratification");
  }

  /* Saddle-back V1–V2 — Brugada Type 2 */
  if (has("stAnt","saddle")) {
    diagnoses.push({sev:"yellow", conf:"medium", name:"Brugada Type 2 pattern (saddle-back)",
      supports:["Saddle-back STE V1–V2"], link:"her"});
    warnings.push({text:"Brugada Type 2: perlu provokasi (ajmaline/flecainide) untuk konfirmasi. Rekam high leads ICS 2/3."});
    addStep("Rekam V1–V2 di ICS 2nd dan 3rd (high leads)");
  }

  /* Pericarditis */
  if (has("prSeg","depDiff") && (has("stInf","ste") || has("stAnt","ste") || has("stLat","ste"))) {
    diagnoses.push({sev:"yellow", conf:"high", name:"Acute Pericarditis",
      supports:["PR depresi difus","STE concave-up diffuse","Tidak ada reciprocal STD"], link:"peri"});
    findings.push({sev:"yellow", text:"Pericarditis pattern — STE diffuse + PR depression"});
    addStep("Echocardiogram untuk efusi perikard");
    addStep("Troponin (rule out myo-pericarditis)");
    addStep("NSAID + colchicine (jika myocarditis ruled out)");
  }

  /* Osborn J wave */
  if (has("other","osborn")) {
    diagnoses.push({sev:"yellow", conf:"high", name:"Hypothermia (Osborn J wave)",
      supports:["Osborn wave terminal QRS","Bradycardia umumnya"], link:"elec"});
    findings.push({sev:"yellow", text:"⚡ Osborn (J) wave — hipotermia"});
    addStep("Suhu inti tubuh; re-warming gradual 0.5–1°C/jam");
    addStep("Hindari manipulasi kasar (risiko VF)");
  }

  /* Epsilon wave */
  if (has("other","epsilon")) {
    diagnoses.push({sev:"yellow", conf:"high", name:"ARVC (Epsilon wave)",
      supports:["Epsilon wave V1–V3","TWI anterior pertimbangkan"], link:"her"});
    findings.push({sev:"yellow", text:"⚡ Epsilon wave — Arrhythmogenic RV Cardiomyopathy"});
    addStep("Cardiac MRI dengan kontras");
    addStep("Konsultasi cardiology / electrophysiology");
    addStep("Family screening (autosomal dominant)");
  }

  /* ─── TIER 4: INTERPRET ─── */

  /* Pathological Q waves */
  if (any("qPath","inf","ant","lat")) {
    const loc = {inf:"inferior",ant:"anterior",lat:"lateral"}[s.qPath];
    diagnoses.push({sev:"grey", conf:"medium", name:"Old MI ("+loc+")",
      supports:["Q patologis "+loc,"Tanpa STE akut"], link:"old"});
    findings.push({sev:"grey", text:"Q patologis "+loc+" — infark lama"});
    addStep("Bandingkan dengan EKG lama untuk dating");
    addStep("Echocardiogram untuk EF dan wall motion");
  }

  /* PRWP */
  if (has("rProg","poor") && !has("qPath","ant")) {
    diagnoses.push({sev:"grey", conf:"medium", name:"Poor R Wave Progression (PRWP)",
      supports:["R V3 ≤3 mm","Transition >V4"], link:"old"});
    findings.push({sev:"grey", text:"Poor R progression — anteroseptal MI vs LVH vs COPD"});
  }

  /* Fragmented QRS */
  if (has("other","fragQrs")) {
    diagnoses.push({sev:"grey", conf:"medium", name:"Fragmented QRS",
      supports:["RSR'/notching di ≥2 lead kontigu"], link:"old"});
    findings.push({sev:"grey", text:"Fragmented QRS — marker fibrosis/scar"});
  }

  /* Normal Sinus Rhythm (if nothing flagged) */
  if (diagnoses.length === 0 && has("rhythm","reg") && has("pwave","normal") &&
      has("pqrs","1to1") && has("rate","60-100") && has("qrsDur","lt120") &&
      has("qrsMorph","normal") && has("axis","normal")) {
    diagnoses.push({sev:"green", conf:"high", name:"Normal Sinus Rhythm",
      supports:["Rate 60–100","P normal 1:1","QRS sempit","Axis normal"], link:null});
    findings.push({sev:"green", text:"✓ Normal sinus rhythm — tidak ada temuan abnormal"});
  }

  /* Confidence label by completeness */
  let confLabel = null;
  if (groupsFilled < 3) confLabel = "Low confidence — kurang data";
  else if (groupsFilled < 6) confLabel = "Moderate confidence";

  return {findings, diagnoses, warnings, nextSteps, conflicts, groupsFilled, confLabel};
}

   RENDERING FUNCTIONS
   ═══════════════════════════════════════════════════════ */

/* ─── TAB 1: NILAI NORMAL ─── */
function renderNormalTab() {
  const container = document.getElementById("normalGroups");
  let html = "";
  NORMAL_GROUPS.forEach((grp, gIdx) => {
    html += '<div class="collapse-wrap" data-group="'+grp.id+'">';
    html += '<div class="collapse-header" data-toggle="'+gIdx+'">';
    html += '<div class="collapse-header-left">';
    html += '<div><div class="collapse-title">'+grp.title+'</div>';
    html += '<div style="font-size:11px;color:var(--text-muted);margin-top:2px;">'+grp.desc+'</div></div>';
    html += '</div>';
    html += '<div class="collapse-header-right">';
    html += '<span class="badge badge-grey">'+grp.rows.length+' parameter</span>';
    html += '<span class="chevron">▾</span>';
    html += '</div></div>';
    html += '<div class="collapse-body"><div class="collapse-body-inner">';
    html += '<table class="param-table"><thead><tr>';
    html += '<th class="col-param">Parameter</th>';
    html += '<th class="col-value">Nilai Normal</th>';
    html += '<th class="col-range">Rentang Visual</th>';

/* ─── INTERPRETATION PANEL ─── */
const SEV_ORDER = {red:0, yellow:1, blue:2, green:3, grey:4};

function renderInterp(result) {
  const panel = document.getElementById("interpPanel");
  const compLabel = document.getElementById("compLabel");
  const compFill = document.getElementById("compFill");

  /* Completeness */
  const pct = Math.round((result.groupsFilled / 7) * 100);
  compFill.style.width = pct + "%";
  compLabel.textContent = result.groupsFilled + "/7 grup diisi"
    + (result.confLabel ? "  •  " + result.confLabel : "");

  if (result.groupsFilled === 0) {
    panel.innerHTML = '<div class="interp-empty">Mulai dengan memilih parameter di kolom kiri.<br>Interpretasi akan muncul secara otomatis.</div>';
    return;
  }

  let html = "";

  /* CONFLICTS */
  if (result.conflicts.length > 0) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">⚠ Konflik Data</div>';
    result.conflicts.forEach(c => {
      html += '<div class="note-box note-red">'+c.text+'</div>';
    });
    html += '</div>';
  }

  /* TEMUAN UTAMA */
  if (result.findings.length > 0) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">Temuan Utama</div>';
    html += '<ul class="finding-list">';
    result.findings.forEach(f => {
      html += '<li class="finding-item"><span class="finding-dot '+f.sev+'"></span><span>'+f.text+'</span></li>';
    });
    html += '</ul></div>';
  }

  /* DIAGNOSA — sorted by severity */
  if (result.diagnoses.length > 0) {
    const sorted = [...result.diagnoses].sort((a,b) => SEV_ORDER[a.sev] - SEV_ORDER[b.sev]);
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">Diagnosa & Diferensial</div>';
    sorted.forEach(d => {
      html += '<div class="dx-card sev-'+d.sev+'">';
      html += '<div class="dx-head">';
      html += '<span class="dx-name">'+d.name+'</span>';
      html += '<span class="dx-conf '+d.conf+'">'+d.conf+'</span>';
      html += '</div>';
      if (d.supports && d.supports.length > 0) {
        html += '<ul class="dx-support">';
        d.supports.forEach(sup => { html += '<li>'+sup+'</li>'; });
        html += '</ul>';
      }
      if (d.link) {
        html += '<button class="dx-link" data-link="'+d.link+'">→ Pelajari di Patofisiologi</button>';
      }
      html += '</div>';
    });
    html += '</div>';
  }

  /* WARNINGS */
  if (result.warnings.length > 0) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">⚠ Perhatikan Juga</div>';
    result.warnings.forEach(w => {
      html += '<div class="note-box note-yellow">'+w.text+'</div>';
    });
    html += '</div>';
  }

  /* LANGKAH SELANJUTNYA */
  if (result.nextSteps.length > 0) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">Langkah Selanjutnya</div>';
    result.nextSteps.forEach(n => {
      html += '<div class="next-step"><span class="cb"></span><span>'+n.text+'</span></div>';
    });
    html += '</div>';
  }

  /* TEMPLATE INTERPRETASI */
  const template = generateTemplate(formState, result);
  if (template) {
    html += '<div class="interp-section">';
    html += '<div class="interp-section-title">Template Interpretasi</div>';
    html += '<div class="template-box" id="templateBox">';
    html += '<button class="copy-btn" id="copyBtn">Copy</button>';
    html += template;
    html += '</div></div>';
  }

  panel.innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════
   TEMPLATE GENERATOR — structured Indonesian interpretation
   ═══════════════════════════════════════════════════════ */
function generateTemplate(s, result) {
  if (result.groupsFilled < 3) return null;

  const lines = [];
  const has = (k, v) => s[k] === v;

  /* Irama & rate */
  const rhythmMap = {
    reg: "regular",
    irregReg: "reguler irregular",
    irregIrreg: "irregularly irregular"
  };
  const rateMap = {
    "lt40": "<40 bpm", "40-60": "40–60 bpm", "60-100": "60–100 bpm",
    "100-150": "100–150 bpm", "gt150": ">150 bpm"
  };
  let rhythmLine = "Irama: ";
  if (s.rhythm && s.pwave) {
    if (has("rhythm","reg") && has("pwave","normal") && has("pqrs","1to1")) {
      rhythmLine += "sinus";
    } else if (has("rhythm","irregIrreg") && has("pwave","absent")) {
      rhythmLine += "fibrilasi atrium";
    } else if (has("pqrs","diss") || has("pqrs","moreP")) {
      rhythmLine += "AV block dengan disosiasi";
    } else {
      rhythmLine += (rhythmMap[s.rhythm] || s.rhythm);
    }
  } else {
    rhythmLine += "—";
  }
  if (s.rate) rhythmLine += ", frekuensi " + (rateMap[s.rate] || s.rate);
  lines.push(rhythmLine + ".");

  /* PR */
  if (s.pr) {
    const prMap = {
      "lt120": "PR interval pendek (<120 ms)",
      "120-200": "PR interval normal (120–200 ms)",
      "gt200": "PR interval memanjang (>200 ms)",
      "varProg": "PR memanjang progresif (Wenckebach)",
      "nm": "PR tidak terukur"
    };
    lines.push(prMap[s.pr] + ".");
  }

  /* QRS */
  if (s.qrsDur || s.qrsMorph) {
    let qrsLine = "QRS ";
    if (s.qrsDur) {
      qrsLine += {"lt120":"sempit (<120 ms)","120-149":"120–149 ms","gte150":"≥150 ms"}[s.qrsDur];
    }
    if (s.qrsMorph && s.qrsMorph !== "normal") {
      qrsLine += ", morfologi " + {rbbb:"RBBB",lbbb:"LBBB",vt:"VT pattern"}[s.qrsMorph];
    }
    lines.push(qrsLine + ".");
  }

  /* Axis */
  if (s.axis) {
    const axisMap = {
      normal:"normal", lad:"deviasi kiri (LAD)", rad:"deviasi kanan (RAD)",
      extreme:"extreme axis", unk:"tidak diketahui"
    };
    lines.push("Axis: " + axisMap[s.axis] + ".");
  }

  /* QTc */
  if (s.qtc) {
    const qtcMap = {
      "lt340":"QTc pendek (<340 ms)","340-440":"QTc normal (340–440 ms)",
      "440-470":"QTc borderline (440–470 ms)","gt470":"QTc memanjang (>470 ms)",
      "gt500":"QTc >500 ms — risiko TdP tinggi"
    };
    lines.push(qtcMap[s.qtc] + ".");
  }

  /* ST */
  const stItems = [];
  if (s.stInf && s.stInf !== "iso") stItems.push("ST inferior: " + (s.stInf === "ste" ? "elevasi" : "depresi"));
  if (s.stAnt && s.stAnt !== "iso") {
    const map = {ste:"elevasi", std:"depresi", coved:"coved", saddle:"saddle-back"};
    stItems.push("ST anterior: " + (map[s.stAnt] || s.stAnt));
  }
  if (s.stLat && s.stLat !== "iso") stItems.push("ST lateral: " + (s.stLat === "ste" ? "elevasi" : "depresi"));
  if (s.stAvr && s.stAvr === "ste") stItems.push("STE di aVR");
  if (s.prSeg === "depDiff") stItems.push("PR depresi difus");
  if (stItems.length > 0) lines.push("ST: " + stItems.join("; ") + ".");
  else if (s.stInf || s.stAnt || s.stLat) lines.push("ST: isoelektrik.");

  /* T & U */
  const twItems = [];
  if (s.tWave && s.tWave !== "normal") {
    const map = {hyper:"hiperakut", peaked:"peaked simetrik",
      deepInv:"inversi dalam simetrik", bi:"bifasik pos→neg", diff:"inversi difus"};
    twItems.push("T " + (map[s.tWave] || s.tWave));
    if (s.tLead) {
      const lmap = {ant:"anterior", lat:"lateral", inf:"inferior", diffuse:"difus"};
      twItems[twItems.length-1] += " di " + (lmap[s.tLead] || s.tLead);
    }
  }
  if (s.uWave === "prom") twItems.push("U prominent");
  if (s.uWave === "inv") twItems.push("U inverted");
  if (twItems.length > 0) lines.push("Gelombang T/U: " + twItems.join("; ") + ".");

  /* QRS morphology details */
  const qmItems = [];
  if (s.qPath && s.qPath !== "none") {
    const map = {inf:"inferior", ant:"anterior", lat:"lateral"};
    qmItems.push("Q patologis " + map[s.qPath]);
  }
  if (s.rProg === "poor") qmItems.push("poor R progression");
  if (s.voltage === "high") qmItems.push("voltage tinggi (LVH?)");
  if (s.voltage === "low") qmItems.push("voltage rendah difus");
  if (s.delta === "present") qmItems.push("delta wave (pre-excitation)");
  if (s.other && s.other !== "none") {
    const map = {osborn:"Osborn J wave", epsilon:"epsilon wave", fragQrs:"fragmented QRS"};
    qmItems.push(map[s.other]);
  }
  if (qmItems.length > 0) lines.push("Morfologi: " + qmItems.join("; ") + ".");

  /* Kesan & DD */
  if (result.diagnoses.length > 0) {
    const sorted = [...result.diagnoses].sort((a,b) => SEV_ORDER[a.sev] - SEV_ORDER[b.sev]);
    const primary = sorted[0];
    const others = sorted.slice(1, 4);
    lines.push("");
    lines.push("Kesan: " + primary.name + ".");
    if (others.length > 0) {
      lines.push("DD/: " + others.map(d => d.name).join("; ") + ".");
    }
  }

  /* Saran */
  if (result.nextSteps.length > 0) {
    lines.push("");
    lines.push("Saran:");
    result.nextSteps.slice(0, 5).forEach((n, i) => {
      lines.push("  " + (i+1) + ". " + n.text);
    });
  }

  return lines.join("\n");
}

/* ═══════════════════════════════════════════════════════════
   STATE & EVENT HANDLERS
   ═══════════════════════════════════════════════════════ */
const formState = {};
let interpTimer = null;

function runInterp() {
  const result = interpretECG(formState);
  renderInterp(result);
}

function scheduleInterp() {
  if (interpTimer) clearTimeout(interpTimer);
  interpTimer = setTimeout(runInterp, 300);
}

/* Pill click: toggle within row */
document.addEventListener("click", function(e) {
  /* Pill toggle */
  if (e.target.classList.contains("pill")) {
    const key = e.target.dataset.key;
    const value = e.target.dataset.value;
    if (!key) return;

    /* Clear all pills in this row, then set active on clicked */
    const row = e.target.parentElement;
    row.querySelectorAll(".pill").forEach(p => p.classList.remove("active"));

    /* Toggle: if same value, deselect */
    if (formState[key] === value) {
      delete formState[key];
    } else {
      formState[key] = value;
      e.target.classList.add("active");
    }
    scheduleInterp();
    return;
  }

  /* Collapse toggle (Tab 1) */
  if (e.target.closest("[data-toggle]")) {
    const header = e.target.closest("[data-toggle]");
    const wrap = header.parentElement;
    const body = wrap.querySelector(".collapse-body");
    const chevron = header.querySelector(".chevron");
    const isOpen = body.classList.contains("open");
    if (isOpen) {
      body.classList.remove("open");
      header.classList.remove("open");
      chevron.classList.remove("open");
    } else {
      body.classList.add("open");
      header.classList.add("open");
      chevron.classList.add("open");
    }
    return;
  }

  /* Collapse toggle (Tab 2) */
  if (e.target.closest("[data-toggle-patho]")) {
    const header = e.target.closest("[data-toggle-patho]");
    const wrap = header.parentElement;
    const body = wrap.querySelector(".collapse-body");
    const chevron = header.querySelector(".chevron");
    const isOpen = body.classList.contains("open");
    if (isOpen) {
      body.classList.remove("open");
      header.classList.remove("open");
      chevron.classList.remove("open");
    } else {
      body.classList.add("open");
      header.classList.add("open");
      chevron.classList.add("open");
    }
    return;
  }

  /* Dx link → switch to Tab 2 and scroll to category */
  if (e.target.classList.contains("dx-link")) {
    const link = e.target.dataset.link;
    if (!link) return;
    switchTab("patho");
    setTimeout(() => {
      const cat = document.getElementById("cat-"+link);
      if (cat) {
        /* Open the category */
        const header = cat.querySelector(".collapse-header");
        const body = cat.querySelector(".collapse-body");
        const chevron = cat.querySelector(".chevron");
        body.classList.add("open");
        header.classList.add("open");
        if (chevron) chevron.classList.add("open");
        /* Scroll */
        cat.scrollIntoView({behavior:"smooth", block:"start"});
      }
    }, 100);
    return;
  }

  /* Copy button */
  if (e.target.id === "copyBtn") {
    const box = document.getElementById("templateBox");
    if (!box) return;
    /* Extract text excluding the button text */
    const text = box.textContent.replace(/^Copy\s*/, "").trim();
    navigator.clipboard.writeText(text).then(() => {
      e.target.classList.add("copied");
      e.target.textContent = "✓ Disalin!";
      setTimeout(() => {
        e.target.classList.remove("copied");
        e.target.textContent = "Copy";
      }, 1500);
    }).catch(() => {
      e.target.textContent = "✗ Gagal";
      setTimeout(() => { e.target.textContent = "Copy"; }, 1500);
    });
    return;
  }
});

/* ─── TAB SWITCHING ─── */
function switchTab(target) {
  /* Buttons */
  document.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.target === target);
  });
  /* Panels */
  document.querySelectorAll(".tab-panel").forEach(p => {
    p.classList.toggle("active", p.dataset.tab === target);
  });
  /* Persist */
  try { sessionStorage.setItem("pulsus-tab", target); } catch (e) { /* ignore */ }
}

document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => switchTab(btn.dataset.target));
});

/* ─── EXPAND/COLLAPSE ALL ─── */
function setupExpandAll(btnId, containerId) {
  const btn = document.getElementById(btnId);
  if (!btn) return;
  btn.addEventListener("click", () => {
    const container = document.getElementById(containerId);
    const bodies = container.querySelectorAll(".collapse-body");
    const headers = container.querySelectorAll(".collapse-header");
    const chevrons = container.querySelectorAll(".chevron");
    const anyClosed = Array.from(bodies).some(b => !b.classList.contains("open"));
    bodies.forEach(b => b.classList.toggle("open", anyClosed));
    headers.forEach(h => h.classList.toggle("open", anyClosed));
    chevrons.forEach(c => c.classList.toggle("open", anyClosed));
    btn.textContent = anyClosed ? "Collapse All" : "Expand All";
  });
}

/* ─── RESET BUTTON ─── */
document.getElementById("resetBtn").addEventListener("click", () => {
  Object.keys(formState).forEach(k => delete formState[k]);
  renderForm();
  runInterp();
});

/* ─── INIT ─── */
document.addEventListener("DOMContentLoaded", function() {
  renderNormalTab();
  renderPathoTab();
  renderForm();
  runInterp();
  setupExpandAll("toggleAll", "normalGroups");
  setupExpandAll("toggleAllPatho", "pathoCategories");

  /* Restore active tab */
  try {
    const saved = sessionStorage.getItem("pulsus-tab");
    if (saved && ["normal","patho","algo"].includes(saved)) {
      switchTab(saved);
    }
  } catch (e) { /* ignore */ }
});

/* Init immediately if already loaded */
if (document.readyState === "loading") {
  /* wait for DOMContentLoaded */
} else {
  renderNormalTab();
  renderPathoTab();
  renderForm();
  runInterp();
  setupExpandAll("toggleAll", "normalGroups");
  setupExpandAll("toggleAllPatho", "pathoCategories");
  try {
    const saved = sessionStorage.getItem("pulsus-tab");
    if (saved && ["normal","patho","algo"].includes(saved)) switchTab(saved);
  } catch (e) {}
}
