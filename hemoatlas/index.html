<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HemoAtlas — Parameter Normal Jantung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-base: #0c1117;
    --bg-surface: #131920;
    --bg-elevated: #1a2330;
    --border: #1e2a35;
    --gold: #d4af6a;
    --gold-dim: #a07840;
    --text-primary: #e8e0d0;
    --text-muted: #7a8a96;
    --green: #2ecc71;
    --yellow: #f39c12;
    --red: #e74c3c;
    --blue: #3498db;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-base);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── NAVBAR ── */
  #navbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg-surface);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  .nav-brand { flex: 0 0 auto; }

  .nav-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.02em;
    line-height: 1;
  }

  .nav-subtitle {
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .nav-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-left: auto;
    flex-wrap: wrap;
  }

  .search-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  #search-input {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-primary);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    padding: 7px 32px 7px 12px;
    border-radius: 6px;
    width: 220px;
    outline: none;
    transition: border-color 0.2s;
  }

  #search-input:focus { border-color: var(--gold-dim); }
  #search-input::placeholder { color: var(--text-muted); }

  #search-clear {
    position: absolute;
    right: 8px;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
    display: none;
  }

  #search-clear:hover { color: var(--text-primary); }

  #toggle-all-btn {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    padding: 7px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  #toggle-all-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── MAIN ── */
  #main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* ── SECTION ── */
  .section {
    background: var(--bg-surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    cursor: pointer;
    user-select: none;
    background: var(--bg-elevated);
    transition: background 0.2s;
  }

  .section-header:hover { background: #1f2e3d; }

  .section-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
    opacity: 0.85;
  }

  .section-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 19px;
    font-weight: 600;
    color: var(--gold);
    flex: 1;
  }

  .section-badge {
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    color: var(--text-muted);
    background: var(--bg-base);
    border: 1px solid var(--border);
    padding: 2px 8px;
    border-radius: 99px;
    white-space: nowrap;
  }

  .chevron {
    color: var(--text-muted);
    font-size: 12px;
    transition: transform 0.3s ease;
    margin-left: 4px;
  }

  .section.collapsed .chevron { transform: rotate(-90deg); }

  .section-body {
    overflow: hidden;
    max-height: 9999px;
    transition: max-height 0.4s ease;
  }

  .section.collapsed .section-body { max-height: 0; }

  /* ── TABLE ── */
  .param-table {
    width: 100%;
    border-collapse: collapse;
  }

  .param-table thead tr {
    background: var(--bg-base);
    border-bottom: 1px solid var(--border);
  }

  .param-table thead th {
    font-family: 'Outfit', sans-serif;
    font-size: 9px;
    font-weight: 500;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 7px 12px;
    text-align: left;
  }

  .param-table thead th:nth-child(2),
  .param-table thead th:nth-child(3) { text-align: center; }

  .param-table tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .param-table tbody tr:last-child { border-bottom: none; }
  .param-table tbody tr:hover { background: rgba(212,175,106,0.04); }

  .param-table tbody tr.highlight-match {
    border-left: 3px solid var(--gold);
    animation: pulse-gold 0.6s ease;
  }

  @keyframes pulse-gold {
    0%   { background: rgba(212,175,106,0.15); }
    100% { background: transparent; }
  }

  .param-table td {
    padding: 10px 12px;
    vertical-align: middle;
  }

  /* Col 1: Parameter */
  .param-name {
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 500;
  }

  .param-abbr {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    background: rgba(212,175,106,0.1);
    border: 1px solid rgba(212,175,106,0.25);
    padding: 1px 6px;
    border-radius: 4px;
    margin-top: 3px;
  }

  .param-formula {
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    font-style: italic;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .param-sub {
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  /* Col 2: Nilai */
  .nilai-cell { text-align: center; min-width: 100px; }

  .nilai-range {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    color: var(--green);
    line-height: 1.4;
  }

  .nilai-unit {
    font-family: 'Outfit', sans-serif;
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .nilai-sex {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--green);
    line-height: 1.6;
  }

  .sex-label { color: var(--text-muted); font-size: 10px; }

  /* Col 3: Range Bar */
  .bar-cell { min-width: 160px; padding: 10px 14px; }

  .range-bar-wrap { width: 100%; }

  .range-bar {
    display: flex;
    height: 12px;
    border-radius: 6px;
    overflow: hidden;
    gap: 1px;
  }

  .bar-seg {
    flex: 1;
    position: relative;
    border-radius: 2px;
    transition: opacity 0.2s;
  }

  .bar-seg.seg-red    { background: linear-gradient(90deg, #c0392b, #e74c3c); opacity: 0.6; }
  .bar-seg.seg-yellow { background: linear-gradient(90deg, #e67e22, #f39c12); opacity: 0.7; }
  .bar-seg.seg-green  { background: linear-gradient(90deg, #27ae60, #2ecc71); opacity: 1; height: 14px; margin-top: -1px; border-radius: 3px; }

  .range-ticks {
    position: relative;
    height: 12px;
    margin-top: 4px;
    width: 100%;
  }

  .range-ticks span {
    position: absolute;
    top: 0;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    color: var(--text-muted);
    white-space: nowrap;
    line-height: 1;
  }

  /* Col 4: Interpretasi */
  .interp-cell { max-width: 240px; }

  .interp-text {
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
  }

  .interp-text .lbl {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .lbl.low  { color: var(--red); }
  .lbl.high { color: var(--yellow); }

  /* Col 5: Metode */
  .metode-cell { text-align: center; min-width: 50px; }

  .metode-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    border-radius: 5px;
    padding: 4px 8px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s;
  }

  .metode-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  .metode-dropdown {
    display: none;
    position: fixed;
    z-index: 200;
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    max-width: 280px;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    color: var(--text-primary);
    line-height: 1.6;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }

  .metode-dropdown.active { display: block; }

  .metode-dropdown .metode-title {
    font-size: 10px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--border);
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    padding: 24px;
    text-align: center;
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    display: none;
  }

  /* ── FOOTER ── */
  #footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-elevated);
    border-top: 1px solid var(--border);
    border-left: 3px solid var(--gold);
    padding: 8px 20px;
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    color: var(--text-muted);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #footer span.warn-icon { color: var(--gold); font-size: 13px; }

  /* ── RESPONSIVE ── */
  @media (max-width: 700px) {
    .param-table thead .hide-mobile { display: none; }
    .param-table td.hide-mobile { display: none; }
    #search-input { width: 160px; }
    .nav-controls { width: 100%; }
    .section-title { font-size: 16px; }
  }

  @media (max-width: 480px) {
    .param-table thead .hide-tablet { display: none; }
    .param-table td.hide-tablet { display: none; }
  }

  /* ── PRINT ── */
  @media print {
    #navbar { position: static; }
    .nav-controls { display: none; }
    #footer { display: none; }
    body { padding-bottom: 0; background: white; color: black; }
    .section { border: 1px solid #ccc; break-inside: avoid; }
    .section.collapsed .section-body { max-height: none !important; }
    .section-header { background: #f5f5f5; }
    .section-title { color: #333; }
    .param-abbr { color: #555; background: #eee; border-color: #ccc; }
    .nilai-range { color: #1a7a3c; }
    .bar-seg.seg-green { background: #2ecc71; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav id="navbar">
  <div class="nav-brand">
    <div class="nav-title">HemoAtlas</div>
    <div class="nav-subtitle">Parameter Normal Jantung — Dewasa Sehat</div>
  </div>
  <div class="nav-controls">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="Cari parameter…" autocomplete="off" spellcheck="false">
      <button id="search-clear" title="Hapus">×</button>
    </div>
    <button id="toggle-all-btn">Tutup Semua</button>
  </div>
</nav>

<!-- MAIN CONTENT -->
<div id="main"></div>

<!-- METODE POPUP -->
<div class="metode-dropdown" id="metode-popup">
  <div class="metode-title">Metode Pengukuran</div>
  <div id="metode-content"></div>
</div>

<!-- FOOTER -->
<div id="footer">
  <span class="warn-icon">⚠️</span>
  <span>WORK IN PROGRESS — Konten belum diverifikasi. Tidak untuk keputusan klinis.</span>
</div>

<script>
// ══════════════════════════════════════════════════════
// PARAMETER DATA
// ══════════════════════════════════════════════════════
const CATEGORIES = [
  {
    id: "hemodynamik",
    name: "Hemodinamik",
    icon: `<svg class="section-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 14 Q7 6 14 6 Q21 6 24 14 Q21 22 14 22 Q7 22 4 14Z" stroke="#d4af6a" stroke-width="1.5" fill="none"/>
      <path d="M2 14 L6 14 L8 10 L11 18 L14 12 L17 16 L19 14 L26 14" stroke="#d4af6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </svg>`
  },
  {
    id: "tekanan",
    name: "Tekanan Ruang Jantung",
    icon: `<svg class="section-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="4" y="8" width="8" height="12" rx="2" stroke="#d4af6a" stroke-width="1.5" fill="none"/>
      <rect x="16" y="5" width="8" height="15" rx="2" stroke="#d4af6a" stroke-width="1.5" fill="none"/>
      <line x1="8" y1="20" x2="8" y2="24" stroke="#d4af6a" stroke-width="1.5"/>
      <line x1="20" y1="20" x2="20" y2="24" stroke="#d4af6a" stroke-width="1.5"/>
    </svg>`
  },
  {
    id: "volume",
    name: "Volume & Fungsi",
    icon: `<svg class="section-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 4 L14 24 M4 14 L24 14" stroke="#d4af6a" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="14" cy="14" r="8" stroke="#d4af6a" stroke-width="1.5" fill="none" stroke-dasharray="3 2"/>
      <circle cx="14" cy="14" r="4" stroke="#d4af6a" stroke-width="1.5" fill="rgba(212,175,106,0.1)"/>
    </svg>`
  },
  {
    id: "katup",
    name: "Katup Jantung",
    icon: `<svg class="section-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 4 C8 4 4 8 4 14 C4 20 8 24 14 24 C20 24 24 20 24 14 C24 8 20 4 14 4Z" stroke="#d4af6a" stroke-width="1.5" fill="none"/>
      <path d="M10 14 L13 17 L18 11" stroke="#d4af6a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`
  },
  {
    id: "oksigenasi",
    name: "Oksigenasi & Metabolik",
    icon: `<svg class="section-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="14" cy="14" r="6" stroke="#d4af6a" stroke-width="1.5" fill="none"/>
      <path d="M14 8 L14 4 M14 24 L14 20 M8 14 L4 14 M24 14 L20 14" stroke="#d4af6a" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="14" cy="14" r="2.5" fill="#d4af6a" opacity="0.5"/>
    </svg>`
  },
  {
    id: "ekokardiografi",
    name: "Ekokardiografi",
    icon: `<svg class="section-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 20 Q8 8 14 8 Q20 8 24 20" stroke="#d4af6a" stroke-width="1.5" fill="none"/>
      <path d="M7 20 Q10 12 14 12 Q18 12 21 20" stroke="#d4af6a" stroke-width="1" fill="rgba(212,175,106,0.08)"/>
      <circle cx="14" cy="20" r="2" fill="#d4af6a" opacity="0.7"/>
    </svg>`
  }
];

const PARAMS = [
  // ── KATEGORI 1: HEMODINAMIK ──
  {
    id:"hr", name:"Heart Rate", abbr:"HR", category:"hemodynamik",
    formula:null,
    normalDisplay:"60–100", normalMin:60, normalMax:100, unit:"bpm",
    rangeLow:20, rangeHigh:180,
    segments:[
      {label:"Rendah",min:20,max:50,color:"red"},
      {label:"Normal Rendah",min:50,max:60,color:"yellow"},
      {label:"Normal",min:60,max:100,color:"green"},
      {label:"Normal Tinggi",min:100,max:120,color:"yellow"},
      {label:"Tinggi",min:120,max:180,color:"red"}
    ],
    interpretation:{
      low:"Bradikardia (<60 bpm): dapat disebabkan oleh blok AV, disfungsi nodus sinus, atau efek obat (beta-blocker, CCB).",
      high:"Takikardia (>100 bpm): pertimbangkan hipovolemia, demam, aritmia, atau gagal jantung kompensatorik."
    },
    measurement:"EKG, pulse oximetry, monitoring telemetri",
    sexSpecific:false
  },
  {
    id:"sv", name:"Stroke Volume", abbr:"SV", category:"hemodynamik",
    formula:"CO / HR",
    normalDisplay:"60–100", normalMin:60, normalMax:100, unit:"mL/beat",
    rangeLow:20, rangeHigh:160,
    segments:[
      {label:"Rendah",min:20,max:50,color:"red"},
      {label:"Normal Rendah",min:50,max:60,color:"yellow"},
      {label:"Normal",min:60,max:100,color:"green"},
      {label:"Normal Tinggi",min:100,max:130,color:"yellow"},
      {label:"Tinggi",min:130,max:160,color:"red"}
    ],
    interpretation:{
      low:"SV rendah menandakan preload tidak adekuat, peningkatan afterload, atau disfungsi miokard.",
      high:"SV tinggi dapat ditemukan pada regurgitasi katup, atau kondisi hiperdinamik."
    },
    measurement:"Ekokardiografi Doppler (LVOT VTI × area), PAC thermodilution, PiCCO",
    sexSpecific:false
  },
  {
    id:"co", name:"Cardiac Output", abbr:"CO", category:"hemodynamik",
    formula:"SV × HR",
    normalDisplay:"4–8", normalMin:4, normalMax:8, unit:"L/min",
    rangeLow:1, rangeHigh:15,
    segments:[
      {label:"Rendah",min:1,max:3,color:"red"},
      {label:"Normal Rendah",min:3,max:4,color:"yellow"},
      {label:"Normal",min:4,max:8,color:"green"},
      {label:"Normal Tinggi",min:8,max:11,color:"yellow"},
      {label:"Tinggi",min:11,max:15,color:"red"}
    ],
    interpretation:{
      low:"CO rendah dapat menandakan gagal jantung, hipovolemia, atau disfungsi sistolik berat.",
      high:"CO tinggi ditemukan pada sepsis, anemia berat, hipertiroidisme, atau kehamilan."
    },
    measurement:"Thermodilusion (PAC), metode Fick, ekokardiografi Doppler (SV × HR)",
    sexSpecific:false
  },
  {
    id:"ci", name:"Cardiac Index", abbr:"CI", category:"hemodynamik",
    formula:"CO / BSA",
    normalDisplay:"2.5–4.0", normalMin:2.5, normalMax:4.0, unit:"L/min/m²",
    rangeLow:0.5, rangeHigh:7,
    segments:[
      {label:"Rendah",min:0.5,max:2.2,color:"red"},
      {label:"Normal Rendah",min:2.2,max:2.5,color:"yellow"},
      {label:"Normal",min:2.5,max:4.0,color:"green"},
      {label:"Normal Tinggi",min:4.0,max:5.5,color:"yellow"},
      {label:"Tinggi",min:5.5,max:7,color:"red"}
    ],
    interpretation:{
      low:"CI <2.2 L/min/m²: low cardiac output state — pertimbangkan syok kardiogenik (Forrester zone III/IV).",
      high:"CI >4.0: kondisi hiperdinamik, evaluasi sepsis atau shunting."
    },
    measurement:"Sama dengan CO, dibagi BSA. BSA oleh formula DuBois atau Mosteller.",
    sexSpecific:false
  },
  {
    id:"map", name:"Mean Arterial Pressure", abbr:"MAP", category:"hemodynamik",
    formula:"DBP + ⅓(SBP – DBP)",
    normalDisplay:"70–105", normalMin:70, normalMax:105, unit:"mmHg",
    rangeLow:40, rangeHigh:160,
    segments:[
      {label:"Rendah",min:40,max:65,color:"red"},
      {label:"Normal Rendah",min:65,max:70,color:"yellow"},
      {label:"Normal",min:70,max:105,color:"green"},
      {label:"Normal Tinggi",min:105,max:130,color:"yellow"},
      {label:"Tinggi",min:130,max:160,color:"red"}
    ],
    interpretation:{
      low:"MAP <65 mmHg: target minimum pada syok — perfusi organ berisiko tidak adekuat.",
      high:"MAP >105 mmHg: hipertensi. Pertimbangkan evaluasi target organ."
    },
    measurement:"Sphygmomanometer (non-invasif), arterial line (invasif, gold standard ICU)",
    sexSpecific:false
  },
  {
    id:"svr", name:"Systemic Vascular Resistance", abbr:"SVR", category:"hemodynamik",
    formula:"(MAP – CVP) / CO × 80",
    normalDisplay:"800–1200", normalMin:800, normalMax:1200, unit:"dyn·s·cm⁻⁵",
    rangeLow:200, rangeHigh:2400,
    segments:[
      {label:"Rendah",min:200,max:600,color:"red"},

// ══════════════════════════════════════════════════════
// RENDER ENGINE
// ══════════════════════════════════════════════════════

let allExpanded = true;
let activeMetode = null;

function getSegmentWidth(seg, rangeLow, rangeHigh) {
  const total = rangeHigh - rangeLow;
  return ((seg.max - seg.min) / total * 100).toFixed(2);
}

function buildRangeBar(param) {
  const { segments, rangeLow, rangeHigh, normalMin, normalMax } = param;
  let html = `<div class="range-bar">`;
  for (const seg of segments) {
    const w = getSegmentWidth(seg, rangeLow, rangeHigh);
    const cls = `seg-${seg.color}`;
    html += `<div class="bar-seg ${cls}" style="flex: ${w} 0 0%" title="${seg.label}: ${seg.min}–${seg.max}"></div>`;
  }
  html += `</div>`;

  // ticks
  const total = rangeHigh - rangeLow;
  const tickVals = [];
  tickVals.push(rangeLow);
  for (const seg of segments) {
    if (!tickVals.includes(seg.max) && seg.max < rangeHigh) tickVals.push(seg.max);
  }
  tickVals.push(rangeHigh);

  const sortedTicks = tickVals.sort((a,b)=>a-b);
  html += `<div class="range-ticks">`;
  sortedTicks.forEach((v, i) => {
    const pct = ((v - rangeLow) / total * 100).toFixed(2);
    let transform = 'translateX(-50%)';
    if (i === 0) transform = 'translateX(0)';
    else if (i === sortedTicks.length - 1) transform = 'translateX(-100%)';
    html += `<span style="left:${pct}%; transform:${transform};">${v}</span>`;
  });
  html += `</div>`;
  return html;
}

function buildNilaiCell(param) {
  if (param.sexSpecific) {
    return `<div class="nilai-sex">
      <div><span class="sex-label">♂ </span>${param.maleRange}</div>
      <div><span class="sex-label">♀ </span>${param.femaleRange}</div>
    </div>
    <div class="nilai-unit">${param.unit}</div>`;
  }
  return `<div class="nilai-range">${param.normalDisplay}</div>
          <div class="nilai-unit">${param.unit}</div>`;
}

function buildRow(param) {
  const formulaHtml = param.formula
    ? `<div class="param-formula">${param.formula}</div>`
    : '';
  return `
    <tr data-id="${param.id}" data-cat="${param.category}">
      <td>
        <div class="param-name">${param.name}</div>
        <span class="param-abbr">${param.abbr}</span>
        ${formulaHtml}
      </td>
      <td class="nilai-cell">${buildNilaiCell(param)}</td>
      <td class="bar-cell hide-tablet">
        <div class="range-bar-wrap">${buildRangeBar(param)}</div>
      </td>
      <td class="interp-cell hide-mobile">
        <div class="interp-text">
          ${param.interpretation.low ? `<div class="lbl low">▼ Rendah</div>${param.interpretation.low}` : ''}
          ${param.interpretation.high ? `<div class="lbl high" style="margin-top:5px">▲ Tinggi</div>${param.interpretation.high}` : ''}
        </div>
      </td>
      <td class="metode-cell">
        <button class="metode-btn" data-metode="${encodeURIComponent(param.measurement)}" data-name="${encodeURIComponent(param.name)}" title="Metode pengukuran">⚗</button>
      </td>
    </tr>`;
}

function buildSection(cat) {
  const catParams = PARAMS.filter(p => p.category === cat.id);
  const rows = catParams.map(buildRow).join('');
  return `
    <div class="section" id="sec-${cat.id}">
      <div class="section-header" data-cat="${cat.id}">
        ${cat.icon}
        <span class="section-title">${cat.name}</span>
        <span class="section-badge" id="badge-${cat.id}">${catParams.length} parameter</span>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <table class="param-table">
          <thead>
            <tr>
              <th>Parameter</th>
              <th>Nilai Normal</th>
              <th class="hide-tablet">Rentang</th>
              <th class="hide-mobile">Interpretasi Klinis</th>
              <th>Metode</th>
            </tr>
          </thead>
          <tbody id="tbody-${cat.id}">${rows}</tbody>
        </table>
        <div class="empty-state" id="empty-${cat.id}">Tidak ditemukan</div>
      </div>
    </div>`;
}

function renderApp() {
  const main = document.getElementById('main');
  main.innerHTML = CATEGORIES.map(buildSection).join('');
  attachSectionHandlers();
  attachMetodeHandlers();
}

function attachSectionHandlers() {
  document.querySelectorAll('.section-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const sec = hdr.closest('.section');
      sec.classList.toggle('collapsed');
      allExpanded = document.querySelectorAll('.section:not(.collapsed)').length > 0;
      updateToggleBtn();
    });
  });
}

function attachMetodeHandlers() {
  document.querySelectorAll('.metode-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const popup = document.getElementById('metode-popup');
      const content = document.getElementById('metode-content');
      if (activeMetode === btn) {
        popup.classList.remove('active');
        activeMetode = null;
        return;
      }
      content.textContent = decodeURIComponent(btn.dataset.metode);
      popup.querySelector('.metode-title').textContent = decodeURIComponent(btn.dataset.name);
      const rect = btn.getBoundingClientRect();
      let top = rect.bottom + 6;
      let left = rect.left;
      if (left + 280 > window.innerWidth) left = window.innerWidth - 290;
      popup.style.top = top + 'px';
      popup.style.left = left + 'px';
      popup.classList.add('active');
      activeMetode = btn;
    });
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.metode-btn') && !e.target.closest('#metode-popup')) {
      document.getElementById('metode-popup').classList.remove('active');
      activeMetode = null;
    }
  });
}

function updateToggleBtn() {
  const btn = document.getElementById('toggle-all-btn');
  const anyOpen = document.querySelectorAll('.section:not(.collapsed)').length > 0;
  btn.textContent = anyOpen ? 'Tutup Semua' : 'Buka Semua';
}

// ══════════════════════════════════════════════════════
// SEARCH
// ══════════════════════════════════════════════════════
function normalizeStr(s) {
  return s.toLowerCase().replace(/[₂₀₁]/g, m => ({'₂':'2','₀':'0','₁':'1'}[m]||m));
}

function searchParams(query) {
  const q = normalizeStr(query.trim());
  if (!q) {
    // show all
    document.querySelectorAll('.param-table tbody tr').forEach(tr => {
      tr.style.display = '';
      tr.classList.remove('highlight-match');
    });
    CATEGORIES.forEach(cat => {
      document.getElementById(`empty-${cat.id}`).style.display = 'none';
    });
    return;
  }

  CATEGORIES.forEach(cat => {
    const tbody = document.getElementById(`tbody-${cat.id}`);
    const rows = tbody.querySelectorAll('tr');
    let visibleCount = 0;

    rows.forEach(tr => {
      const id = tr.dataset.id;
      const param = PARAMS.find(p => p.id === id);
      const searchText = normalizeStr([
        param.name, param.abbr, param.formula||'', param.unit,
        param.normalDisplay, param.category,
        param.interpretation.low||'', param.interpretation.high||''
      ].join(' '));

      if (searchText.includes(q)) {
        tr.style.display = '';
        tr.classList.remove('highlight-match');
        // slight delay for animation re-trigger
        setTimeout(() => tr.classList.add('highlight-match'), 10);
        visibleCount++;

        // expand parent section
        const sec = document.getElementById(`sec-${cat.id}`);
        sec.classList.remove('collapsed');
      } else {
        tr.style.display = 'none';
        tr.classList.remove('highlight-match');
      }
    });

    const empty = document.getElementById(`empty-${cat.id}`);
    const badge = document.getElementById(`badge-${cat.id}`);
    empty.style.display = visibleCount === 0 ? 'block' : 'none';
    badge.textContent = visibleCount + (visibleCount === 1 ? ' parameter' : ' parameter');
  });
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  renderApp();

  const input = document.getElementById('search-input');
  const clear = document.getElementById('search-clear');

  input.addEventListener('input', () => {
    const q = input.value;
    clear.style.display = q ? 'block' : 'none';
    searchParams(q);
    updateToggleBtn();
  });

  clear.addEventListener('click', () => {
    input.value = '';
    clear.style.display = 'none';
    searchParams('');
    // restore badges
    CATEGORIES.forEach(cat => {
      const count = PARAMS.filter(p => p.category === cat.id).length;
      document.getElementById(`badge-${cat.id}`).textContent = count + ' parameter';
    });
    updateToggleBtn();
  });

  document.getElementById('toggle-all-btn').addEventListener('click', () => {
    const anyOpen = document.querySelectorAll('.section:not(.collapsed)').length > 0;
    if (anyOpen) {
      document.querySelectorAll('.section').forEach(s => s.classList.add('collapsed'));
    } else {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('collapsed'));
    }
    updateToggleBtn();
  });
});
</script>
